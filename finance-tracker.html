<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Finance">
<title>Finance</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#000;overscroll-behavior:none}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Helvetica Neue',sans-serif;color:#fff;overflow-x:hidden;-webkit-font-smoothing:antialiased}
input,textarea,button{font-family:inherit}
::-webkit-scrollbar{display:none}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}

/* Layout */
#app{max-width:393px;margin:0 auto;min-height:100vh;background:#000;position:relative}
#content{padding-bottom:80px;min-height:100vh}

/* Tab bar */
#tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:393px;background:rgba(0,0,0,0.96);border-top:1px solid #141414;backdrop-filter:blur(20px);display:flex;padding-bottom:env(safe-area-inset-bottom,0px);z-index:100}
.tab-btn{flex:1;padding:10px 0 9px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;min-height:56px}
.tab-icon{font-size:22px;opacity:.22;transition:opacity .15s}
.tab-icon.active{opacity:1}
.tab-label{font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:#3a3a3a;transition:color .15s}
.tab-label.active{color:#fff}

/* FAB */
#fab{position:fixed;bottom:calc(64px + env(safe-area-inset-bottom,0px));right:max(16px,calc(50% - 196px + 16px));width:56px;height:56px;border-radius:50%;background:#fff;color:#000;border:none;font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 28px rgba(255,255,255,.18);z-index:90;line-height:1}

/* Overlay */
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .2s}
#overlay.show{opacity:1;pointer-events:all}
#modal{background:#0d0d0d;border-radius:20px 20px 0 0;width:100%;border-top:1px solid #1e1e1e;padding:0 20px;padding-bottom:calc(env(safe-area-inset-bottom,0px) + 24px);transform:translateY(100%);transition:transform .25s cubic-bezier(.32,.72,0,1)}
#overlay.show #modal{transform:translateY(0)}

/* Common */
.section-label{font-size:10px;color:#555;letter-spacing:.12em;text-transform:uppercase}
.card{background:#090909;border:1px solid #181818;border-radius:12px;padding:16px}
.input-field{width:100%;background:#111;border:1px solid #1c1c1c;border-radius:8px;padding:12px 14px;color:#fff;font-size:14px;outline:none}
.input-field::placeholder{color:#333}
textarea.input-field{resize:none;line-height:1.55}
.btn-primary{width:100%;padding:16px;background:#fff;color:#000;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:-.3px;min-height:54px}
.btn-secondary{background:#1a1a1a;color:#666;border:none;border-radius:8px;font-size:14px;cursor:pointer;min-height:44px}
.pill{flex:1;padding:10px 0;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;min-height:44px;transition:background .15s,color .15s}
.pill.active{background:#fff;color:#000}
.pill.inactive{background:#111;color:#555}

/* Entry row */
.entry-row{display:flex;justify-content:space-between;align-items:center;padding:13px 0;border-bottom:1px solid #0f0f0f;cursor:pointer;min-height:60px}
.entry-desc{font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.entry-meta{font-size:12px;color:#444;margin-top:3px}
.entry-amount{font-size:16px;font-weight:700;white-space:nowrap;margin-left:12px}
.amount-income{color:#e8e8e8}
.amount-expense{color:#666}

/* Bar chart */
.bar-bg{height:6px;background:#0d0d0d;border-radius:3px}
.bar-fill{height:100%;border-radius:3px;transition:width .4s ease}

/* Delete row */
.delete-row{padding:14px 0;border-bottom:1px solid #0f0f0f;display:flex;gap:8px;align-items:center;min-height:60px}

/* Toggle */
.toggle-wrap{display:flex;background:#181818;border-radius:10px;padding:4px;margin-bottom:18px}
.toggle-btn{flex:1;padding:11px 0;border-radius:7px;border:none;cursor:pointer;font-size:15px;font-weight:700;min-height:44px;transition:background .15s,color .15s}
.toggle-btn.active{background:#fff;color:#000}
.toggle-btn.inactive{background:transparent;color:#444}

/* Filter strip */
.filter-strip{display:flex;gap:8px;padding:10px 20px;position:sticky;top:0;background:#000;z-index:10;border-bottom:1px solid #0d0d0d}

/* Analysis bar */
.analysis-item{margin-bottom:22px}

/* Search */
.search-wrap{padding:10px 20px;background:#000;border-bottom:1px solid #0d0d0d}
.search-input{width:100%;background:#111;border:1px solid #1a1a1a;border-radius:10px;padding:10px 14px;color:#fff;font-size:14px;outline:none}
.search-input::placeholder{color:#333}

/* Budget bar */
.budget-track{height:4px;background:#1a1a1a;border-radius:2px;overflow:hidden}
.budget-fill{height:100%;border-radius:2px;transition:width .5s ease}

/* Confirm import */
#import-confirm{margin-top:12px;background:#111;border-radius:8px;padding:14px;display:none}
#import-confirm.show{display:block}

/* Print */
@media print{
  .no-print{display:none!important}
  .print-only{display:block!important}
  body{background:#fff!important;color:#000!important}
}
.print-only{display:none}
</style>
</head>
<body>
<div id="app">
  <div id="content"></div>

  <!-- Bottom tab bar -->
  <nav id="tabbar" class="no-print">
    <button class="tab-btn" onclick="setTab(0)">
      <span class="tab-icon active" id="ti0">⊡</span>
      <span class="tab-label active" id="tl0">Inicio</span>
    </button>
    <button class="tab-btn" onclick="setTab(1)">
      <span class="tab-icon" id="ti1">≡</span>
      <span class="tab-label" id="tl1">Movimientos</span>
    </button>
    <button class="tab-btn" onclick="setTab(2)">
      <span class="tab-icon" id="ti2">◎</span>
      <span class="tab-label" id="tl2">Análisis</span>
    </button>
    <button class="tab-btn" onclick="setTab(3)">
      <span class="tab-icon" id="ti3">↑</span>
      <span class="tab-label" id="tl3">Exportar</span>
    </button>
  </nav>

  <!-- FAB -->
  <button id="fab" class="no-print" onclick="openAddModal()">+</button>

  <!-- Add Modal -->
  <div id="overlay" onclick="handleOverlayClick(event)">
    <div id="modal">
      <div style="width:36px;height:4px;background:#2a2a2a;border-radius:2px;margin:14px auto 22px"></div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:22px">
        <div style="font-size:20px;font-weight:800;letter-spacing:-.8px">Nueva entrada</div>
        <button onclick="closeModal()" style="background:#1a1a1a;border:none;color:#666;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center">×</button>
      </div>

      <div class="toggle-wrap">
        <button id="toggle-expense" class="toggle-btn active" onclick="setEntryType('expense')">Gasto</button>
        <button id="toggle-income"  class="toggle-btn inactive" onclick="setEntryType('income')">Ingreso</button>
      </div>

      <div style="margin-bottom:14px">
        <div class="section-label" style="margin-bottom:7px">Importe (€)</div>
        <div style="position:relative">
          <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:24px;color:#333;font-weight:700;pointer-events:none">€</span>
          <input id="modal-amount" type="text" inputmode="decimal" placeholder="0,00"
            style="width:100%;background:#111;border:1px solid #1c1c1c;border-radius:10px;padding:15px 14px 15px 40px;color:#fff;font-size:30px;font-weight:800;outline:none;letter-spacing:-1.5px"
            oninput="validateModal()" onkeydown="if(event.key==='Enter')submitEntry()">
        </div>
      </div>

      <div style="margin-bottom:22px">
        <div class="section-label" style="margin-bottom:7px">Descripción</div>
        <input id="modal-desc" type="text" placeholder="Ej: Mercadona, Netflix, Taxi…"
          style="width:100%;background:#111;border:1px solid #1c1c1c;border-radius:10px;padding:14px;color:#fff;font-size:16px;outline:none"
          oninput="validateModal()" onkeydown="if(event.key==='Enter')submitEntry()">
      </div>

      <button id="modal-save" onclick="submitEntry()"
        style="width:100%;padding:17px;background:#141414;color:#2a2a2a;border:none;border-radius:12px;font-size:16px;font-weight:800;cursor:default;letter-spacing:-.3px;min-height:54px">
        Guardar
      </button>
      <div id="modal-status" style="text-align:center;font-size:12px;color:#3a3a3a;margin-top:9px;min-height:18px"></div>
    </div>
  </div>

  <!-- Print view -->
  <div class="print-only" id="print-view"></div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
var state = {
  entries: [],
  apiKey: '',
  activeTab: 0,
  entryType: 'expense',
  deleteId: null,
  filter: 'all',
  searchQ: '',
  importParsed: null,
  analysisResult: '',
  clearVal: '',
  budget: 0
};

// ── Storage ────────────────────────────────────────────────────────────────
function lsGet(k, fb) {
  try { var v = localStorage.getItem(k); return v != null ? JSON.parse(v) : fb; } catch(e) { return fb; }
}
function lsSet(k, v) {
  try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {}
}
function load() {
  state.entries = lsGet('ft_entries', []);
  state.apiKey  = lsGet('ft_apikey', '');
  state.budget  = lsGet('ft_budget', 0);
}
function save() {
  lsSet('ft_entries', state.entries);
  lsSet('ft_apikey',  state.apiKey);
  lsSet('ft_budget',  state.budget);
}

// ── Date helpers ───────────────────────────────────────────────────────────
function todayStr() { return new Date().toISOString().split('T')[0]; }
function monthOf(d) { return (d || '').substring(0, 7); }
function currentMonth() {
  var n = new Date();
  return n.getFullYear() + '-' + String(n.getMonth() + 1).padStart(2, '0');
}
function prevMonth() {
  var n = new Date(), p = new Date(n.getFullYear(), n.getMonth() - 1, 1);
  return p.getFullYear() + '-' + String(p.getMonth() + 1).padStart(2, '0');
}
function fmtDate(d) {
  if (!d) return '';
  var dt = new Date(d + 'T12:00:00');
  return dt.toLocaleDateString('es-ES', { day: '2-digit', month: 'short' });
}
function fmtMonthLabel(m) {
  if (!m) return '';
  var parts = m.split('-');
  return new Date(parts[0], parts[1] - 1, 1).toLocaleDateString('es-ES', { month: 'long', year: 'numeric' });
}
function fmtEur(n) {
  return '€' + Math.abs(n).toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function uid() { return Date.now().toString() + Math.random().toString(36).slice(2, 6); }

// ── Amount sanitiser (comma fix) ───────────────────────────────────────────
// Accepts "24,50" or "24.50" — always returns a parseable string
function sanitizeAmt(val) {
  return String(val).replace(/,/g, '.').replace(/[^0-9.]/g, '');
}

// ── Anthropic API ──────────────────────────────────────────────────────────
async function callClaude(prompt, maxTokens) {
  if (!state.apiKey) throw new Error('NO_KEY');
  maxTokens = maxTokens || 256;
  var res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': state.apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: maxTokens,
      messages: [{ role: 'user', content: prompt }]
    })
  });
  var data = await res.json();
  if (!res.ok) throw new Error(data.error && data.error.message || 'HTTP ' + res.status);
  return data.content[0].text.trim();
}

async function inferCategory(description, type) {
  var cats = type === 'income'
    ? ['Salary', 'Freelance', 'Other']
    : ['Food', 'Transport', 'Subscriptions', 'Health', 'Shopping', 'Other'];
  try {
    var r = await callClaude(
      'Classify this transaction into exactly one of: ' + cats.join(', ') + '.\n' +
      'Transaction: "' + description + '"\n' +
      'Reply with ONLY the category name, nothing else.',
      24
    );
    return cats.indexOf(r) !== -1 ? r : 'Other';
  } catch(e) { return 'Other'; }
}

// ── Tab Navigation ─────────────────────────────────────────────────────────
function setTab(i) {
  state.activeTab = i;
  state.deleteId  = null;
  ['ti0','ti1','ti2','ti3'].forEach(function(id, idx) {
    document.getElementById(id).className = 'tab-icon'  + (idx === i ? ' active' : '');
  });
  ['tl0','tl1','tl2','tl3'].forEach(function(id, idx) {
    document.getElementById(id).className = 'tab-label' + (idx === i ? ' active' : '');
  });
  render();
}

// ── Modal ──────────────────────────────────────────────────────────────────
var modalSaving = false;

function openAddModal(initial) {
  initial = initial || {};
  state.entryType = initial.type || 'expense';
  var amtEl  = document.getElementById('modal-amount');
  var descEl = document.getElementById('modal-desc');
  amtEl.value  = initial.amount || '';
  descEl.value = initial.description || '';
  setEntryType(state.entryType);
  validateModal();
  document.getElementById('overlay').classList.add('show');
  setTimeout(function() {
    if (!initial.amount) amtEl.focus(); else descEl.focus();
  }, 320);
}

function closeModal() {
  if (modalSaving) return;
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('modal-status').textContent = '';
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}

function setEntryType(t) {
  state.entryType = t;
  document.getElementById('toggle-expense').className = 'toggle-btn ' + (t === 'expense' ? 'active' : 'inactive');
  document.getElementById('toggle-income').className  = 'toggle-btn ' + (t === 'income'  ? 'active' : 'inactive');
}

function validateModal() {
  var amt  = parseFloat(sanitizeAmt(document.getElementById('modal-amount').value));
  var desc = document.getElementById('modal-desc').value.trim();
  var btn  = document.getElementById('modal-save');
  var valid = amt > 0 && desc.length > 0;
  btn.style.background = valid ? '#fff' : '#141414';
  btn.style.color      = valid ? '#000' : '#2a2a2a';
  btn.style.cursor     = valid ? 'pointer' : 'default';
  return valid;
}

async function submitEntry() {
  if (!validateModal() || modalSaving) return;
  var amt  = parseFloat(sanitizeAmt(document.getElementById('modal-amount').value));
  var desc = document.getElementById('modal-desc').value.trim();
  var btn  = document.getElementById('modal-save');
  var status = document.getElementById('modal-status');

  modalSaving = true;
  btn.textContent = 'Guardando…';
  btn.style.opacity = '0.7';
  status.textContent = 'Asignando categoría con IA…';

  var category = await inferCategory(desc, state.entryType);

  state.entries.unshift({ id:uid(), type:state.entryType, amount:amt, description:desc, category:category, date:todayStr() });
  save();

  modalSaving = false;
  btn.textContent = 'Guardar';
  btn.style.opacity = '1';
  status.textContent = '';
  closeModal();
  render();
}

// ── Visual helpers ─────────────────────────────────────────────────────────

// SVG donut chart. segments = [{label, v, g}] where g = gray 0-255
function buildDonut(segments, size) {
  if (!segments || !segments.length) return '';
  size = size || 140;
  var cx = size / 2, cy = size / 2;
  var outerR = size / 2 - 6;
  var innerR = Math.round(outerR * 0.58);
  var total  = segments.reduce(function(s, d) { return s + d.v; }, 0);
  if (total === 0) return '';

  // Single segment → full circle (SVG arc of 360° breaks, use circle element)
  if (segments.length === 1) {
    var g = segments[0].g;
    return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 ' + size + ' ' + size + '">' +
      '<circle cx="' + cx + '" cy="' + cy + '" r="' + outerR + '" fill="rgb(' + g + ',' + g + ',' + g + ')"/>' +
      '<circle cx="' + cx + '" cy="' + cy + '" r="' + innerR + '" fill="#000"/>' +
      '</svg>';
  }

  var paths = [];
  var angle = -Math.PI / 2; // start at 12 o'clock
  var gapA  = 0.03;         // tiny gap between segments

  segments.forEach(function(seg) {
    var sweep = (seg.v / total) * Math.PI * 2;
    var a1 = angle + gapA / 2;
    var a2 = angle + sweep - gapA / 2;
    if (a2 <= a1) { angle += sweep; return; }
    var large = (sweep - gapA) > Math.PI ? 1 : 0;
    var x1o = (cx + outerR * Math.cos(a1)).toFixed(2), y1o = (cy + outerR * Math.sin(a1)).toFixed(2);
    var x2o = (cx + outerR * Math.cos(a2)).toFixed(2), y2o = (cy + outerR * Math.sin(a2)).toFixed(2);
    var x1i = (cx + innerR * Math.cos(a2)).toFixed(2), y1i = (cy + innerR * Math.sin(a2)).toFixed(2);
    var x2i = (cx + innerR * Math.cos(a1)).toFixed(2), y2i = (cy + innerR * Math.sin(a1)).toFixed(2);
    paths.push(
      '<path d="M' + x1o + ',' + y1o +
      ' A' + outerR + ',' + outerR + ' 0 ' + large + ',1 ' + x2o + ',' + y2o +
      ' L' + x1i + ',' + y1i +
      ' A' + innerR + ',' + innerR + ' 0 ' + large + ',0 ' + x2i + ',' + y2i +
      ' Z" fill="rgb(' + seg.g + ',' + seg.g + ',' + seg.g + ')"/>'
    );
    angle += sweep;
  });

  return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 ' + size + ' ' + size + '">' + paths.join('') + '</svg>';
}

// 6-month income vs expense SVG bar chart
function buildTrendChart() {
  var months = [];
  var now = new Date();
  for (var i = 5; i >= 0; i--) {
    var d   = new Date(now.getFullYear(), now.getMonth() - i, 1);
    var key = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
    var lbl = d.toLocaleDateString('es-ES', { month: 'short' }).replace('.','');
    var inc = 0, exp = 0;
    state.entries.forEach(function(e) {
      if (monthOf(e.date) === key) {
        if (e.type === 'income') inc += e.amount; else exp += e.amount;
      }
    });
    months.push({ label: lbl, inc: inc, exp: exp });
  }

  var hasData = months.some(function(m) { return m.inc > 0 || m.exp > 0; });
  if (!hasData) return '';

  var W = 353, H = 72, bW = 13, gap = 3;
  var colW = W / 6;
  var maxVal = months.reduce(function(mx, m) { return Math.max(mx, m.inc, m.exp); }, 1);

  var items = '';
  months.forEach(function(m, i) {
    var cx  = i * colW + colW / 2;
    var incH = (m.inc / maxVal) * H;
    var expH = (m.exp / maxVal) * H;
    if (m.inc > 0)
      items += '<rect x="' + (cx - bW - gap/2).toFixed(1) + '" y="' + (H - incH).toFixed(1) + '" width="' + bW + '" height="' + incH.toFixed(1) + '" rx="3" fill="#3a3a3a"/>';
    if (m.exp > 0)
      items += '<rect x="' + (cx + gap/2).toFixed(1) + '" y="' + (H - expH).toFixed(1) + '" width="' + bW + '" height="' + expH.toFixed(1) + '" rx="3" fill="#888"/>';
    items += '<text x="' + cx.toFixed(1) + '" y="' + (H + 14) + '" text-anchor="middle" font-size="9" fill="#3a3a3a" font-family="-apple-system,Helvetica Neue,sans-serif">' + m.label + '</text>';
  });

  return '<svg width="100%" height="' + (H + 18) + '" viewBox="0 0 ' + W + ' ' + (H + 18) + '" preserveAspectRatio="xMidYMid meet">' + items + '</svg>';
}

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  var tab = state.activeTab;
  var el  = document.getElementById('content');
  if      (tab === 0) el.innerHTML = renderDashboard();
  else if (tab === 1) el.innerHTML = renderTransactions();
  else if (tab === 2) el.innerHTML = renderAnalysis();
  else if (tab === 3) el.innerHTML = renderExport();
  attachListeners(tab);
  renderPrint();
}

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Dashboard ──────────────────────────────────────────────────────────────
function renderDashboard() {
  var cm = currentMonth();
  var cmEntries = state.entries.filter(function(e){ return monthOf(e.date) === cm; });
  var allInc = state.entries.filter(function(e){ return e.type==='income'; }).reduce(function(s,e){ return s+e.amount; },0);
  var allExp = state.entries.filter(function(e){ return e.type==='expense'; }).reduce(function(s,e){ return s+e.amount; },0);
  var bal  = allInc - allExp;
  var mInc = cmEntries.filter(function(e){ return e.type==='income'; }).reduce(function(s,e){ return s+e.amount; },0);
  var mExp = cmEntries.filter(function(e){ return e.type==='expense'; }).reduce(function(s,e){ return s+e.amount; },0);
  var mNet = mInc - mExp;
  var savingsRate = mInc > 0 ? Math.max(0, Math.round((mNet / mInc) * 100)) : null;

  // Category breakdown for donut
  var byCat = {};
  cmEntries.filter(function(e){ return e.type==='expense'; }).forEach(function(e){
    byCat[e.category] = (byCat[e.category] || 0) + e.amount;
  });
  var grays = [210, 170, 140, 115, 92, 72];
  var sortedCats = Object.keys(byCat).map(function(k){ return { label:k, v:byCat[k] }; })
    .sort(function(a,b){ return b.v - a.v; });
  sortedCats.forEach(function(s, i){ s.g = grays[Math.min(i, grays.length-1)]; });

  // Donut + legend
  var donutHtml = '';
  if (sortedCats.length > 0) {
    var legend = sortedCats.map(function(s) {
      var pct = mExp > 0 ? (s.v / mExp * 100).toFixed(0) : 0;
      return '<div style="display:flex;align-items:center;gap:7px;margin-bottom:7px">' +
        '<div style="width:8px;height:8px;border-radius:50%;background:rgb(' + s.g + ',' + s.g + ',' + s.g + ');flex-shrink:0"></div>' +
        '<div style="flex:1;font-size:12px;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + esc(s.label) + '</div>' +
        '<div style="font-size:12px;font-weight:600;color:#555">' + pct + '%</div>' +
        '</div>';
    }).join('');
    donutHtml = '<div style="display:flex;align-items:center;gap:18px;padding:20px 20px 0">' +
      '<div style="flex-shrink:0">' + buildDonut(sortedCats, 130) + '</div>' +
      '<div style="flex:1;min-width:0">' +
        '<div class="section-label" style="margin-bottom:12px">Gastos del mes</div>' +
        legend +
      '</div>' +
      '</div>';
  }

  // Budget progress bar
  var budgetHtml = '';
  if (state.budget > 0) {
    var pctB = Math.min(100, (mExp / state.budget) * 100);
    var fillColor = pctB >= 90 ? '#999' : pctB >= 70 ? '#666' : '#3a3a3a';
    var remaining = state.budget - mExp;
    budgetHtml = '<div style="padding:20px 20px 0">' +
      '<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px">' +
        '<div class="section-label">Presupuesto mensual</div>' +
        '<div style="font-size:12px;color:#444">' + (remaining >= 0 ? 'Quedan ' + fmtEur(remaining) : 'Excedido ' + fmtEur(Math.abs(remaining))) + '</div>' +
      '</div>' +
      '<div class="budget-track">' +
        '<div class="budget-fill" style="width:' + pctB.toFixed(1) + '%;background:' + fillColor + '"></div>' +
      '</div>' +
      '<div style="display:flex;justify-content:space-between;margin-top:5px">' +
        '<div style="font-size:10px;color:#2a2a2a">' + fmtEur(mExp) + ' gastado</div>' +
        '<div style="font-size:10px;color:#2a2a2a">' + fmtEur(state.budget) + ' límite</div>' +
      '</div>' +
      '</div>';
  }

  // 6-month trend
  var trendSvg = buildTrendChart();
  var trendHtml = '';
  if (trendSvg) {
    trendHtml = '<div style="padding:20px 20px 0">' +
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">' +
        '<div class="section-label">Tendencia 6 meses</div>' +
        '<div style="display:flex;gap:12px">' +
          '<div style="display:flex;align-items:center;gap:5px"><div style="width:8px;height:8px;border-radius:2px;background:#3a3a3a"></div><span style="font-size:9px;color:#3a3a3a;text-transform:uppercase;letter-spacing:.06em">Ingresos</span></div>' +
          '<div style="display:flex;align-items:center;gap:5px"><div style="width:8px;height:8px;border-radius:2px;background:#888"></div><span style="font-size:9px;color:#3a3a3a;text-transform:uppercase;letter-spacing:.06em">Gastos</span></div>' +
        '</div>' +
      '</div>' +
      trendSvg +
      '</div>';
  }

  // Savings badge
  var savingsBadge = savingsRate !== null
    ? '<span style="display:inline-block;margin-left:12px;font-size:11px;color:#3a3a3a;background:#0d0d0d;border:1px solid #1a1a1a;border-radius:20px;padding:3px 10px;vertical-align:middle">Ahorro ' + savingsRate + '%</span>'
    : '';

  var recent = state.entries.slice(0, 10);
  var rows = recent.length === 0
    ? '<div style="text-align:center;padding:52px 0"><div style="font-size:36px;opacity:.12;margin-bottom:12px">◻</div><div style="font-size:15px;color:#2e2e2e;font-weight:500">Sin transacciones</div><div style="font-size:13px;color:#222;margin-top:5px">Pulsa + para empezar</div></div>'
    : recent.map(function(e){ return entryRowHtml(e); }).join('');

  return [
    '<div>',
    '<div style="padding:60px 20px 22px;border-bottom:1px solid #0f0f0f">',
    '  <div class="section-label" style="margin-bottom:8px">Balance Total</div>',
    '  <div style="font-size:58px;font-weight:800;letter-spacing:-3.5px;line-height:1;font-variant-numeric:tabular-nums">' + (bal < 0 ? '−' : '+') + fmtEur(bal) + '</div>',
    '  <div style="font-size:13px;color:#3a3a3a;margin-top:10px">' + esc(fmtMonthLabel(cm)) + savingsBadge + '</div>',
    '</div>',
    '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:#111;border-bottom:1px solid #111">',
    card('Ingresos', fmtEur(mInc), 'este mes'),
    card('Gastos',   fmtEur(mExp), 'este mes'),
    card('Neto', (mNet<0?'−':'+') + fmtEur(mNet), 'este mes'),
    '</div>',
    budgetHtml,
    donutHtml,
    trendHtml,
    '<div style="padding:20px 20px 0">',
    '  <div class="section-label" style="margin-bottom:12px">Recientes</div>',
    rows,
    '</div>',
    '</div>'
  ].join('');
}

function card(label, val, sub) {
  return '<div style="background:#000;padding:15px 12px">' +
    '<div class="section-label" style="margin-bottom:6px">' + esc(label) + '</div>' +
    '<div style="font-size:14px;font-weight:700;letter-spacing:-.5px;font-variant-numeric:tabular-nums">' + esc(val) + '</div>' +
    '<div style="font-size:10px;color:#2e2e2e;margin-top:3px">' + esc(sub) + '</div>' +
    '</div>';
}

function entryRowHtml(e, withDelete) {
  var amtCls = e.type === 'income' ? 'amount-income' : 'amount-expense';
  var sign   = e.type === 'income' ? '+' : '−';
  var inner =
    '<div style="flex:1;min-width:0;padding-right:12px">' +
    '  <div class="entry-desc">' + esc(e.description) + '</div>' +
    '  <div class="entry-meta">' + esc(e.category) + ' · ' + esc(fmtDate(e.date)) + '</div>' +
    '</div>' +
    '<div class="entry-amount ' + amtCls + '">' + sign + fmtEur(e.amount) + '</div>';
  if (withDelete) return '<div class="entry-row" onclick="confirmDelete(\'' + esc(e.id) + '\')">' + inner + '</div>';
  return '<div class="entry-row">' + inner + '</div>';
}

// ── Transactions ───────────────────────────────────────────────────────────
function renderTransactions() {
  var q = state.searchQ.toLowerCase().trim();
  var filtered = state.entries.filter(function(e) {
    if (state.filter === 'income'   && e.type !== 'income')  return false;
    if (state.filter === 'expenses' && e.type !== 'expense') return false;
    if (q && (e.description + ' ' + e.category).toLowerCase().indexOf(q) === -1) return false;
    return true;
  });

  var rows = filtered.length === 0
    ? '<div style="text-align:center;padding:60px 0;color:#2e2e2e;font-size:14px">' + (q ? 'Sin resultados para "' + esc(state.searchQ) + '"' : 'Sin entradas') + '</div>'
    : filtered.map(function(e) {
        if (state.deleteId === e.id) {
          return '<div class="delete-row">' +
            '<div style="flex:1;font-size:13px;color:#555;line-height:1.4">¿Eliminar «' + esc(e.description) + '»?</div>' +
            '<button onclick="doDelete(\'' + esc(e.id) + '\')" style="padding:0 16px;background:#fff;color:#000;border:none;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;min-height:44px;min-width:60px">Sí</button>' +
            '<button onclick="cancelDelete()" class="btn-secondary" style="padding:0 14px;min-width:50px">No</button>' +
            '</div>';
        }
        return entryRowHtml(e, true);
      }).join('');

  return [
    '<div>',
    '<div style="padding:60px 20px 16px;border-bottom:1px solid #0f0f0f">',
    '  <div style="font-size:28px;font-weight:800;letter-spacing:-1.5px">Movimientos</div>',
    '</div>',
    '<div class="filter-strip">',
    '<button class="pill ' + (state.filter==='all'?'active':'inactive') + '" onclick="setFilter(\'all\')">Todo</button>',
    '<button class="pill ' + (state.filter==='income'?'active':'inactive') + '" onclick="setFilter(\'income\')">Ingresos</button>',
    '<button class="pill ' + (state.filter==='expenses'?'active':'inactive') + '" onclick="setFilter(\'expenses\')">Gastos</button>',
    '</div>',
    '<div class="search-wrap">',
    '  <input class="search-input" type="text" placeholder="Buscar transacciones…" value="' + esc(state.searchQ) + '" oninput="updateSearch(this.value)">',
    '</div>',
    '<div style="padding:0 20px">',
    rows,
    '</div>',
    '</div>'
  ].join('');
}

function setFilter(f) { state.filter = f; state.deleteId = null; render(); }
function confirmDelete(id) { state.deleteId = id; render(); }
function cancelDelete()    { state.deleteId = null; render(); }
function doDelete(id)      { state.entries = state.entries.filter(function(e){ return e.id !== id; }); save(); state.deleteId = null; render(); }
function updateSearch(v) {
  state.searchQ = v;
  render();
  // re-focus search so typing is uninterrupted after DOM rebuild
  var si = document.querySelector('.search-input');
  if (si) { si.focus(); try { si.setSelectionRange(v.length, v.length); } catch(e){} }
}

// ── Analysis ───────────────────────────────────────────────────────────────
function renderAnalysis() {
  var cm = currentMonth(), pm = prevMonth();
  var cmExp  = state.entries.filter(function(e){ return monthOf(e.date)===cm && e.type==='expense'; });
  var pmExp  = state.entries.filter(function(e){ return monthOf(e.date)===pm && e.type==='expense'; });
  var totExp = cmExp.reduce(function(s,e){ return s+e.amount; },0);

  var byCat = {}, pmByCat = {};
  cmExp.forEach(function(e){ byCat[e.category]   = (byCat[e.category]   || 0) + e.amount; });
  pmExp.forEach(function(e){ pmByCat[e.category] = (pmByCat[e.category] || 0) + e.amount; });

  var sorted = Object.keys(byCat).map(function(k){ return [k, byCat[k]]; }).sort(function(a,b){ return b[1]-a[1]; });
  var grays  = [215, 178, 148, 122, 100, 82];

  var catRows = sorted.length === 0
    ? '<div style="color:#222;font-size:14px;text-align:center;padding:28px 0 24px">Sin gastos registrados este mes</div>'
    : sorted.map(function(pair, i) {
        var cat = pair[0], amount = pair[1];
        var pct  = totExp > 0 ? (amount / totExp * 100) : 0;
        var prev = pmByCat[cat] || 0;
        var diff = amount - prev;
        var g    = grays[Math.min(i, grays.length-1)];
        var vsText = '';
        if (prev > 0) vsText = 'vs ant.: ' + (diff>0?'+':'−') + fmtEur(Math.abs(diff));
        else if (pmExp.length > 0) vsText = 'nuevo este mes';
        return '<div class="analysis-item">' +
          '<div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:8px">' +
          '  <div><div style="font-size:14px;font-weight:600">' + esc(cat) + '</div>' +
          (vsText ? '<div style="font-size:11px;color:#444;margin-top:2px">' + esc(vsText) + '</div>' : '') +
          '  </div>' +
          '  <div style="text-align:right">' +
          '    <span style="font-size:15px;font-weight:700">' + fmtEur(amount) + '</span>' +
          '    <span style="font-size:11px;color:#555;margin-left:6px">' + pct.toFixed(0) + '%</span>' +
          '  </div>' +
          '</div>' +
          '<div class="bar-bg"><div class="bar-fill" style="width:' + Math.min(pct,100).toFixed(1) + '%;background:rgb(' + g + ',' + g + ',' + g + ')"></div></div>' +
          '</div>';
      }).join('');

  var prevSection = '';
  if (pmExp.length > 0) {
    var pmTotal  = pmExp.reduce(function(s,e){ return s+e.amount; },0);
    var pmSorted = Object.keys(pmByCat).map(function(k){ return [k,pmByCat[k]]; }).sort(function(a,b){ return b[1]-a[1]; });
    prevSection = '<div style="margin-top:4px;margin-bottom:20px;background:#0a0a0a;border:1px solid #111;border-radius:10px;padding:14px 16px">' +
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">' +
        '<div class="section-label">Mes anterior — ' + esc(fmtMonthLabel(pm)) + '</div>' +
        '<div style="font-size:12px;font-weight:700;color:#444">' + fmtEur(pmTotal) + '</div>' +
      '</div>' +
      pmSorted.map(function(p) {
        var pPct = pmTotal > 0 ? (p[1]/pmTotal*100).toFixed(0) : 0;
        return '<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #0f0f0f;font-size:13px">' +
          '<span style="color:#555">' + esc(p[0]) + '</span>' +
          '<div style="display:flex;gap:8px;align-items:center">' +
            '<span style="color:#2a2a2a;font-size:11px">' + pPct + '%</span>' +
            '<span style="color:#444;font-variant-numeric:tabular-nums">' + fmtEur(p[1]) + '</span>' +
          '</div></div>';
      }).join('') +
      '</div>';
  }

  var resultHtml = '';
  if (state.analysisResult) {
    resultHtml = '<div id="analysis-result" style="margin-top:16px;background:#080808;border:1px solid #1a1a1a;border-radius:12px;padding:18px">' +
      '<div class="section-label" style="margin-bottom:12px">Claude AI</div>' +
      '<div style="font-size:14px;line-height:1.7;color:#aaa;white-space:pre-wrap">' + esc(state.analysisResult) + '</div>' +
      '</div>';
  }

  return [
    '<div style="padding-bottom:20px">',
    '<div style="padding:60px 20px 16px;border-bottom:1px solid #0f0f0f">',
    '  <div style="font-size:28px;font-weight:800;letter-spacing:-1.5px">Análisis</div>',
    '</div>',
    '<div style="padding:20px 20px 0">',
    '  <div class="section-label" style="margin-bottom:18px">Gastos por categoría — ' + esc(fmtMonthLabel(cm)) + '</div>',
    catRows,
    prevSection,
    '  <button class="btn-primary" onclick="doAnalysis()" id="analysis-btn">✦  Analizar con Claude</button>',
    '  <div id="analysis-error" style="margin-top:12px;font-size:13px;color:#555;text-align:center"></div>',
    resultHtml,
    '</div>',
    '</div>'
  ].join('');
}

async function doAnalysis() {
  var btn = document.getElementById('analysis-btn');
  var errEl = document.getElementById('analysis-error');
  if (!btn) return;
  btn.textContent = 'Analizando…';
  btn.style.opacity = '0.7';
  if (errEl) errEl.textContent = '';

  var cm = currentMonth(), pm = prevMonth();
  var cmExp  = state.entries.filter(function(e){ return monthOf(e.date)===cm && e.type==='expense'; });
  var pmExp  = state.entries.filter(function(e){ return monthOf(e.date)===pm && e.type==='expense'; });
  var cmInc  = state.entries.filter(function(e){ return monthOf(e.date)===cm && e.type==='income'; }).reduce(function(s,e){ return s+e.amount; },0);
  var pmInc  = state.entries.filter(function(e){ return monthOf(e.date)===pm && e.type==='income'; }).reduce(function(s,e){ return s+e.amount; },0);
  var totExp = cmExp.reduce(function(s,e){ return s+e.amount; },0);
  var pmTot  = pmExp.reduce(function(s,e){ return s+e.amount; },0);
  var byCat={}, pmByCat={};
  cmExp.forEach(function(e){ byCat[e.category]=(byCat[e.category]||0)+e.amount; });
  pmExp.forEach(function(e){ pmByCat[e.category]=(pmByCat[e.category]||0)+e.amount; });

  try {
    var r = await callClaude(
      'Eres un asesor financiero personal. Responde SOLO en español.\n\n' +
      'Mes actual (' + fmtMonthLabel(cm) + '):\n' +
      '- Ingresos: €' + cmInc.toFixed(2) + '\n' +
      '- Gastos totales: €' + totExp.toFixed(2) + '\n' +
      '- Por categoría: ' + JSON.stringify(byCat) + '\n\n' +
      'Mes anterior (' + fmtMonthLabel(pm) + '):\n' +
      '- Ingresos: €' + pmInc.toFixed(2) + '\n' +
      '- Gastos totales: €' + pmTot.toFixed(2) + '\n' +
      '- Por categoría: ' + JSON.stringify(pmByCat) + '\n\n' +
      'Responde con 3 secciones (usa estos títulos exactos):\n\n' +
      'DÓNDE GASTÁS DE MÁS\n[máx 3 puntos con cifras]\n\n' +
      'COMPARACIÓN MES A MES\n[diferencias clave]\n\n' +
      'CONSEJOS DE AHORRO\n[3 consejos personalizados y accionables]',
      900
    );
    state.analysisResult = r;
    render();
  } catch(e) {
    if (btn) { btn.textContent = '✦  Analizar con Claude'; btn.style.opacity = '1'; }
    var errEl2 = document.getElementById('analysis-error');
    if (errEl2) errEl2.textContent = e.message === 'NO_KEY'
      ? 'Configura tu API key en la pestaña Exportar.'
      : 'Error: ' + e.message;
  }
}

    // Budget

    '  <div style="font-size:12px;color:#444;line-height:1.5;margin-bottom:10px">Límite de gasto mensual — muestra la barra de progreso en el inicio</div>',
    '  <div style="position:relative">',

    '    <input type="text" inputmode="decimal" id="budget-input" class="input-field" placeholder="0,00" style="padding-left:30px" value="' + (state.budget > 0 ? String(state.budget).replace('.',',') : '') + '" oninput="updateBudget(this.value)">',
    '  </div>',
    state.budget > 0 ? '<div style="font-size:11px;color:#3a3a3a;margin-top:7px">✓ Presupuesto: ' + fmtEur(state.budget) + ' / mes</div>' : '',
    '</div>',

    // Import

    '  <div id="import-error" style="margin-top:8px;font-size:12px;color:#555"></div>',
    '  <div id="import-confirm" class="' + (state.importParsed ? 'show' : '') + '">',
    state.importParsed ? renderImportConfirm(state.importParsed) : '',
    '  </div>',
    '</div>',

    // Stats
    '<div style="background:#090909;border:1px solid #0f0f0f;border-radius:12px;padding:16px 20px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">',
    statCell('Entradas', state.entries.length),
    statCell('Ingresos', fmtEur(totInc)),
    statCell('Gastos',   fmtEur(totExp)),
    '</div>',

    // PDF
    '<button class="btn-primary" onclick="window.print()">Exportar PDF · Compartir</button>',

    // Danger
    '<div class="card" style="margin-top:8px">',
    '  <div style="font-size:13px;font-weight:700;color:#444;margin-bottom:4px">Zona peligrosa</div>',
    '  <div style="font-size:12px;color:#333;line-height:1.5;margin-bottom:10px">Escribe DELETE para borrar todos los datos</div>',
    '  <input id="clear-input" class="input-field" placeholder="DELETE" style="margin-bottom:8px;letter-spacing:2px" autocapitalize="characters" oninput="updateClearBtn(this.value)">',
    '  <button id="clear-btn" onclick="doClear()" style="width:100%;padding:12px;background:#0d0d0d;color:#2a2a2a;border:1px solid #1c1c1c;border-radius:8px;font-size:14px;font-weight:600;cursor:default;min-height:44px">Borrar todo</button>',
    '</div>',

    '</div></div>'
  ].join('');
}

function statCell(label, val) {
  return '<div style="text-align:center"><div style="font-size:18px;font-weight:700;font-variant-numeric:tabular-nums">' + esc(String(val)) + '</div><div class="section-label" style="margin-top:4px">' + esc(label) + '</div></div>';
}

function renderImportConfirm(p) {
  return '<div style="font-size:11px;color:#444;margin-bottom:8px">Confirmar entrada:</div>' +
    '<div style="font-size:17px;font-weight:700">' + esc(p.description) + '</div>' +
    '<div style="font-size:13px;color:#555;margin-top:4px;font-variant-numeric:tabular-nums">' + fmtEur(p.amount) + ' · ' + esc(p.category) + ' · ' + (p.type==='expense'?'Gasto':'Ingreso') + '</div>' +
    '<div style="display:flex;gap:8px;margin-top:12px">' +
    '<button onclick="confirmImport()" style="flex:1;padding:12px;background:#fff;color:#000;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;min-height:44px">Guardar</button>' +
    '<button onclick="cancelImport()" class="btn-secondary" style="flex:1;padding:12px">Cancelar</button>' +
    '</div>';
}

function updateApiKey(v) { state.apiKey = v; lsSet('ft_apikey', v); }
function updateBudget(v) {
  var n = parseFloat(sanitizeAmt(v));
  state.budget = (isNaN(n) || n <= 0) ? 0 : n;
  lsSet('ft_budget', state.budget);
}
function updateClearBtn(v) {
  var btn = document.getElementById('clear-btn');
  if (!btn) return;
  if (v === 'DELETE') { btn.style.background='#1e1e1e'; btn.style.color='#777'; btn.style.cursor='pointer'; }
  else                { btn.style.background='#0d0d0d'; btn.style.color='#2a2a2a'; btn.style.cursor='default'; }
}
function doClear() {
  var v = document.getElementById('clear-input');
  if (!v || v.value !== 'DELETE') return;
  state.entries = []; state.analysisResult = ''; save(); render();
}

async function doImport() {
  var textEl = document.getElementById('import-text');
  var errEl  = document.getElementById('import-error');
  var btn    = document.getElementById('import-btn');
  var conf   = document.getElementById('import-confirm');
  if (!textEl || !textEl.value.trim()) return;

  var txt = textEl.value.trim();
  if (errEl) errEl.textContent = '';
  if (conf)  conf.className = '';
  if (btn)   { btn.textContent = 'Procesando…'; btn.style.opacity = '0.6'; }

  var parsed = null;

  if (state.apiKey) {
    try {
      var r = await callClaude(
        'Extract a financial transaction from the text below.\n' +
        'Return ONLY a valid JSON object:\n' +
        '{"type":"expense","amount":24.50,"description":"Mercadona","category":"Food"}\n' +
        'Rules: type is "expense" or "income". amount is a number. description max 30 chars. ' +
        'category is one of: Food, Transport, Subscriptions, Health, Shopping, Salary, Freelance, Other.\n\n' +
        'Text: "' + txt.substring(0, 400) + '"\n\nReturn ONLY the JSON.',
        128
      );
      var clean = r.replace(/```(?:json)?\n?|```\n?/g,'').trim();
      var p = JSON.parse(clean);
      if (p.amount > 0 && p.description) parsed = p;
    } catch(e) {}
  }

  if (!parsed) {
    var m = txt.match(/(\d+)[,.](\d{1,2})/);
    if (m) {
      var amt  = parseFloat(m[1] + '.' + m[2]);
      var words = txt.replace(/[€$£\d.,\-+:]/g,' ').replace(/\s+/g,' ').trim().split(' ').filter(Boolean);
      parsed = { type:'expense', amount:amt, description:words.slice(0,4).join(' ').substring(0,30)||'Importado', category:'Other' };
    }
  }

  if (btn) { btn.textContent = 'Analizar texto'; btn.style.opacity = '1'; }

  if (parsed) {
    state.importParsed = parsed;
    if (conf) { conf.innerHTML = renderImportConfirm(parsed); conf.className = 'show'; }
  } else {
    if (errEl) errEl.textContent = 'No se pudo detectar ningún importe. Añade manualmente con el botón +.';
  }
}

function confirmImport() {
  if (!state.importParsed) return;
  var p = state.importParsed;
  state.entries.unshift({ id:uid(), type:p.type, amount:Number(p.amount), description:p.description, category:p.category, date:todayStr() });
  save();
  state.importParsed = null;
  var textEl = document.getElementById('import-text');
  if (textEl) textEl.value = '';
  var conf = document.getElementById('import-confirm');
  if (conf) conf.className = '';
  render();
}

function cancelImport() {
  state.importParsed = null;
  var conf = document.getElementById('import-confirm');
  if (conf) conf.className = '';
}

// ── Print ──────────────────────────────────────────────────────────────────
function renderPrint() {
  var el = document.getElementById('print-view');
  if (!el) return;
  var inc = state.entries.filter(function(e){ return e.type==='income'; }).reduce(function(s,e){ return s+e.amount; },0);
  var exp = state.entries.filter(function(e){ return e.type==='expense'; }).reduce(function(s,e){ return s+e.amount; },0);
  var bal = inc - exp;
  var byCat={};
  state.entries.filter(function(e){ return e.type==='expense'; }).forEach(function(e){ byCat[e.category]=(byCat[e.category]||0)+e.amount; });
  var catRows = Object.keys(byCat).length === 0 ? '' :
    Object.keys(byCat).sort(function(a,b){ return byCat[b]-byCat[a]; }).map(function(c){
      return '<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #eee;font-size:13px"><span>' + esc(c) + '</span><span style="font-weight:700">' + fmtEur(byCat[c]) + '</span></div>';
    }).join('');

  el.innerHTML = [
    '<div style="padding:40px 48px;color:#000;font-family:-apple-system,Helvetica Neue,sans-serif;max-width:640px">',
    '<div style="border-bottom:2px solid #000;padding-bottom:20px;margin-bottom:24px">',
    '  <div style="font-size:30px;font-weight:800;letter-spacing:-1px">Resumen Financiero</div>',
    '  <div style="font-size:13px;color:#888;margin-top:6px">' + new Date().toLocaleDateString('es-ES',{year:'numeric',month:'long',day:'numeric'}) + '</div>',
    '</div>',
    '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-bottom:32px">',
    printStat('Balance', (bal<0?'−':'+') + fmtEur(bal)),
    printStat('Ingresos totales', fmtEur(inc)),
    printStat('Gastos totales', fmtEur(exp)),
    '</div>',
    '<div style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#aaa;margin-bottom:10px">Por categoría</div>',
    catRows,
    '<div style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#aaa;margin-top:28px;margin-bottom:10px">Transacciones (' + state.entries.length + ')</div>',
    state.entries.map(function(e){
      return '<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f2f2f2;font-size:12px;gap:12px">' +
        '<div style="flex:1"><span style="font-weight:600">' + esc(e.description) + '</span><span style="color:#aaa;margin-left:6px">(' + esc(e.category) + ')</span></div>' +
        '<div style="text-align:right;white-space:nowrap"><span style="font-weight:700">' + (e.type==='income'?'+':'−') + fmtEur(e.amount) + '</span><span style="color:#bbb;margin-left:8px">' + esc(fmtDate(e.date)) + '</span></div>' +
        '</div>';
    }).join(''),
    '</div>'
  ].join('');
}
function printStat(l,v){ return '<div><div style="font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px">' + esc(l) + '</div><div style="font-size:22px;font-weight:800">' + esc(v) + '</div></div>'; }

// ── Attach listeners ───────────────────────────────────────────────────────
function attachListeners(tab) {
  if (tab === 3) {
    var ta  = document.getElementById('import-text');
    var btn = document.getElementById('import-btn');
    if (ta && btn) {
      ta.addEventListener('input', function() {
        var has = ta.value.trim().length > 0;
        btn.style.background = has ? '#1a1a1a' : '#0d0d0d';
        btn.style.color      = has ? '#888'    : '#2a2a2a';
      });
    }
  }
}

// ── URL params (Apple Pay Shortcut) ────────────────────────────────────────
function parseUrlParams() {
  var p = new URLSearchParams(window.location.search);
  if (p.get('action') === 'add') {
    var init = {
      type:        p.get('type')        || 'expense',
      amount:      p.get('amount')      || '',
      description: p.get('description') || ''
    };
    window.history.replaceState({}, '', window.location.pathname);
    openAddModal(init);
  }
}

// ── Boot ───────────────────────────────────────────────────────────────────
load();
render();
parseUrlParams();
</script>
