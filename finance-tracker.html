<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Finance">
<title>Finance</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#000;overscroll-behavior:none}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Helvetica Neue',sans-serif;color:#fff;overflow-x:hidden;-webkit-font-smoothing:antialiased}
input,textarea,button{font-family:inherit}
::-webkit-scrollbar{display:none}

/* Layout */
#app{max-width:393px;margin:0 auto;min-height:100vh;background:#000;position:relative}
#content{padding-bottom:84px;min-height:100vh}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes growW{from{width:0}}
@keyframes donutIn{from{opacity:0;transform:rotate(-50deg) scale(.9)}to{opacity:1;transform:none}}
@keyframes riseY{from{transform:scaleY(0)}to{transform:scaleY(1)}}
@keyframes drawLine{from{stroke-dashoffset:600}to{stroke-dashoffset:0}}
@keyframes popIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:none}}
.anim-in{animation:fadeUp .35s ease both}
.row-in{animation:fadeUp .3s ease both}
.pressable{transition:transform .12s ease}
.pressable:active{transform:scale(.96)}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* Tab bar */
#tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:393px;background:rgba(0,0,0,.96);border-top:1px solid #141414;backdrop-filter:blur(20px);display:flex;padding-bottom:env(safe-area-inset-bottom,0px);z-index:100}
.tab-btn{flex:1;padding:10px 0 9px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;min-height:56px}
.tab-icon{font-size:22px;opacity:.22;transition:opacity .2s,transform .2s}
.tab-icon.active{opacity:1;transform:translateY(-1px)}
.tab-label{font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:#3a3a3a;transition:color .2s}
.tab-label.active{color:#fff}

/* FAB */
#fab{position:fixed;bottom:calc(64px + env(safe-area-inset-bottom,0px));right:max(16px,calc(50% - 196px + 16px));width:56px;height:56px;border-radius:50%;background:#fff;color:#000;border:none;font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 28px rgba(255,255,255,.18);z-index:90;line-height:1;transition:transform .25s cubic-bezier(.32,.72,0,1)}
#fab.open{transform:rotate(45deg)}

/* Overlay / Modal */
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .22s}
#overlay.show{opacity:1;pointer-events:all}
#modal{background:#0d0d0d;border-radius:22px 22px 0 0;width:100%;border-top:1px solid #1e1e1e;padding:0 20px;padding-bottom:calc(env(safe-area-inset-bottom,0px) + 22px);transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
#overlay.show #modal{transform:translateY(0)}

/* Segmented toggle with sliding thumb */
.seg{position:relative;display:flex;background:#161616;border-radius:11px;padding:4px;margin-bottom:16px}
.seg-thumb{position:absolute;top:4px;left:4px;width:calc(50% - 4px);bottom:4px;background:#fff;border-radius:8px;transition:transform .28s cubic-bezier(.32,.72,0,1)}
.seg-opt{flex:1;position:relative;z-index:1;background:none;border:none;font-size:15px;font-weight:700;padding:11px 0;color:#555;cursor:pointer;transition:color .2s;min-height:44px}
.seg-opt.on{color:#000}

/* Chips */
.chips{display:flex;gap:8px;overflow-x:auto;padding:2px 0 4px}
.chip{flex-shrink:0;padding:9px 14px;border-radius:18px;background:#141414;border:1px solid #1f1f1f;color:#777;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s,color .15s,border-color .15s;min-height:38px;white-space:nowrap}
.chip.on{background:#fff;color:#000;border-color:#fff}
.chip-sm{padding:7px 12px;font-size:12px;min-height:32px;border-radius:15px}

/* Common */
.section-label{font-size:10px;color:#555;letter-spacing:.12em;text-transform:uppercase}
.card{background:#090909;border:1px solid #181818;border-radius:12px;padding:16px}
.input-field{width:100%;background:#111;border:1px solid #1c1c1c;border-radius:8px;padding:12px 14px;color:#fff;font-size:14px;outline:none}
.input-field::placeholder{color:#333}
textarea.input-field{resize:none;line-height:1.55}
.btn-primary{width:100%;padding:16px;background:#fff;color:#000;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:-.3px;min-height:54px}
.btn-secondary{background:#1a1a1a;color:#666;border:none;border-radius:8px;font-size:14px;cursor:pointer;min-height:44px}
.pill{flex:1;padding:10px 0;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;min-height:42px;transition:background .15s,color .15s}
.pill.active{background:#fff;color:#000}
.pill.inactive{background:#111;color:#555}
.pill-sm{min-height:34px;padding:7px 0;font-size:12px;border-radius:7px}
input[type=date]{color-scheme:dark}

/* Entry rows */
.entry-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;min-height:58px}
.entry-desc{font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.entry-meta{font-size:12px;color:#444;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.entry-amount{font-size:16px;font-weight:700;white-space:nowrap;margin-left:12px;font-variant-numeric:tabular-nums}
.amount-income{color:#e8e8e8}
.amount-expense{color:#666}

/* Day headers */
.day-head{display:flex;justify-content:space-between;align-items:baseline;padding:16px 0 6px;border-bottom:1px solid #131313}
.day-head .dh-l{font-size:11px;font-weight:700;color:#666;letter-spacing:.1em;text-transform:uppercase}
.day-head .dh-net{font-size:12px;font-weight:700;color:#444;font-variant-numeric:tabular-nums}

/* Swipe-to-delete */
.swipe-wrap{position:relative;overflow:hidden;border-bottom:1px solid #0f0f0f}
.swipe-row{position:relative;z-index:1;background:#000;will-change:transform;touch-action:pan-y;cursor:pointer}
.swipe-del{position:absolute;right:0;top:0;bottom:0;width:88px;background:#1c1c1c;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:0}
.swipe-del span{font-size:12px;font-weight:700;color:#999;letter-spacing:.04em;text-transform:uppercase}

/* Bars */
.bar-bg{height:6px;background:#0d0d0d;border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;animation:growW .6s cubic-bezier(.25,.8,.25,1) both}
.budget-track{height:4px;background:#1a1a1a;border-radius:2px;overflow:hidden}
.budget-fill{height:100%;border-radius:2px;animation:growW .7s ease both}

/* Filter strip */
.filter-strip{display:flex;gap:8px;padding:10px 20px 4px;background:#000}
.filter-strip2{display:flex;gap:8px;padding:6px 20px 10px;background:#000;border-bottom:1px solid #0d0d0d}

/* Search */
.search-wrap{padding:10px 20px;background:#000;border-bottom:1px solid #0d0d0d}
.search-input{width:100%;background:#111;border:1px solid #1a1a1a;border-radius:10px;padding:10px 14px;color:#fff;font-size:14px;outline:none}
.search-input::placeholder{color:#333}

/* Analysis */
.analysis-item{margin-bottom:22px}

/* Balance mode toggle */
.bal-toggle{display:inline-flex;background:#101010;border:1px solid #1c1c1c;border-radius:18px;padding:3px;gap:2px}
.bal-opt{padding:6px 14px;border-radius:14px;border:none;background:transparent;color:#555;font-size:12px;font-weight:700;cursor:pointer;transition:background .2s,color .2s;min-height:32px}
.bal-opt.on{background:#fff;color:#000}

/* Import confirm */
#import-confirm{margin-top:12px;background:#111;border-radius:8px;padding:14px;display:none}
#import-confirm.show{display:block}

/* Details / guide */
details.card summary{cursor:pointer;font-size:13px;font-weight:700;list-style:none;display:flex;justify-content:space-between;align-items:center}
details.card summary::-webkit-details-marker{display:none}
details.card summary::after{content:'+';color:#444;font-size:18px;font-weight:400}
details.card[open] summary::after{content:'−'}
.guide-line{font-size:12.5px;color:#777;line-height:1.65;margin-top:10px}
.guide-line b{color:#bbb;font-weight:600}
.guide-ex{display:flex;justify-content:space-between;gap:10px;font-size:12px;padding:6px 0;border-bottom:1px solid #131313}
.guide-ex .bad{color:#553f3f;text-decoration:line-through}
.guide-ex .good{color:#aaa;font-weight:600}

/* Print */
@media print{
  .no-print{display:none!important}
  .print-only{display:block!important}
  body{background:#fff!important;color:#000!important}
}
.print-only{display:none}
</style>
</head>
<body>
<div id="app">
  <div id="content"></div>

  <nav id="tabbar" class="no-print">
    <button class="tab-btn" onclick="setTab(0)">
      <span class="tab-icon active" id="ti0">⊡</span>
      <span class="tab-label active" id="tl0">Inicio</span>
    </button>
    <button class="tab-btn" onclick="setTab(1)">
      <span class="tab-icon" id="ti1">≡</span>
      <span class="tab-label" id="tl1">Movimientos</span>
    </button>
    <button class="tab-btn" onclick="setTab(2)">
      <span class="tab-icon" id="ti2">◎</span>
      <span class="tab-label" id="tl2">Análisis</span>
    </button>
    <button class="tab-btn" onclick="setTab(3)">
      <span class="tab-icon" id="ti3">↑</span>
      <span class="tab-label" id="tl3">Ajustes</span>
    </button>
  </nav>

  <button id="fab" class="no-print pressable" onclick="openAddModal()">+</button>

  <!-- Add / Edit Modal -->
  <div id="overlay" onclick="handleOverlayClick(event)">
    <div id="modal">
      <div style="width:36px;height:4px;background:#2a2a2a;border-radius:2px;margin:14px auto 20px"></div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
        <div style="font-size:20px;font-weight:800;letter-spacing:-.8px" id="modal-title">Nueva entrada</div>
        <button onclick="closeModal()" class="pressable" style="background:#1a1a1a;border:none;color:#666;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center">×</button>
      </div>

      <div class="seg">
        <div class="seg-thumb" id="seg-thumb"></div>
        <button class="seg-opt on" id="seg-exp" onclick="setEntryType('expense')">Gasto</button>
        <button class="seg-opt" id="seg-inc" onclick="setEntryType('income')">Ingreso</button>
      </div>

      <div style="margin-bottom:14px">
        <div style="position:relative">
          <span style="position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:26px;color:#333;font-weight:700;pointer-events:none">€</span>
          <input id="modal-amount" type="text" inputmode="decimal" placeholder="0,00"
            style="width:100%;background:#111;border:1px solid #1c1c1c;border-radius:12px;padding:16px 14px 16px 44px;color:#fff;font-size:32px;font-weight:800;outline:none;letter-spacing:-1.5px"
            oninput="validateModal()" onkeydown="if(event.key==='Enter')submitEntry()">
        </div>
      </div>

      <div style="margin-bottom:12px">
        <input id="modal-desc" type="text" placeholder="Descripción — ej: HiperDino, Guagua…" autocapitalize="sentences"
          style="width:100%;background:#111;border:1px solid #1c1c1c;border-radius:10px;padding:14px;color:#fff;font-size:16px;outline:none"
          oninput="onDescInput()" onkeydown="if(event.key==='Enter')submitEntry()">
        <div id="cat-hint" style="font-size:11px;color:#3e3e3e;margin-top:6px;min-height:14px;padding-left:2px"></div>
      </div>

      <div id="desc-sugg-wrap" style="margin-bottom:14px;display:none">
        <div class="section-label" style="margin-bottom:7px">Frecuentes</div>
        <div class="chips" id="desc-sugg"></div>
      </div>

      <div style="margin-bottom:14px">
        <div class="section-label" style="margin-bottom:7px">Pago</div>
        <div class="chips" id="pay-chips"></div>
      </div>

      <div style="margin-bottom:14px">
        <div class="section-label" style="margin-bottom:7px">Categoría</div>
        <div class="chips" id="cat-chips"></div>
      </div>

      <div style="margin-bottom:18px">
        <div class="section-label" style="margin-bottom:7px">Fecha</div>
        <div style="display:flex;gap:8px;align-items:center">
          <input type="date" id="modal-date" class="input-field" style="flex:1;font-size:14px" onchange="setModalDateVal(this.value)">
          <button class="chip chip-sm" id="date-hoy" onclick="setModalDateQuick(0)">Hoy</button>
          <button class="chip chip-sm" id="date-ayer" onclick="setModalDateQuick(1)">Ayer</button>
        </div>
      </div>

      <button id="modal-save" class="pressable" onclick="submitEntry()"
        style="width:100%;padding:17px;background:#141414;color:#2a2a2a;border:none;border-radius:12px;font-size:16px;font-weight:800;cursor:default;letter-spacing:-.3px;min-height:54px">
        Guardar
      </button>
      <div id="modal-status" style="text-align:center;font-size:12px;color:#3a3a3a;margin-top:8px;min-height:16px"></div>
      <div id="modal-del"></div>
    </div>
  </div>

  <div class="print-only" id="print-view"></div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
var state = {
  entries: [],
  apiKey: '',
  activeTab: 0,
  entryType: 'expense',
  filter: 'all',
  payFilter: 'all',
  searchQ: '',
  importParsed: null,
  analysisResult: '',
  budget: 0,
  balMode: 'mine',     // 'mine' (sin T. Tía) | 'all'
  // modal state
  editingId: null,
  modalCat: 'auto',
  modalPayment: 'card2',
  modalDate: ''
};

// ── Payments ───────────────────────────────────────────────────────────────
var PAYMENTS = {
  card1: { label: 'Tarjeta Tía', short: 'T. Tía',  icon: '▤' },
  card2: { label: 'Mi Tarjeta',  short: 'Mi tarj.', icon: '▦' },
  cash:  { label: 'Efectivo',    short: 'Efectivo', icon: '◇' }
};
var PAY_IDS = ['card1','card2','cash'];

// ── Storage ────────────────────────────────────────────────────────────────
function lsGet(k, fb) {
  try { var v = localStorage.getItem(k); return v != null ? JSON.parse(v) : fb; } catch(e) { return fb; }
}
function lsSet(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {} }

var LEGACY_CATS = {Food:'comida_snacks',Transport:'transporte',Subscriptions:'suscripciones',
                   Health:'cuidado_personal',Shopping:'ropa',Other:'otros',Salary:'salario',Freelance:'freelance'};

function load() {
  state.entries = lsGet('ft_entries', []);
  state.apiKey  = lsGet('ft_apikey', '');
  state.budget  = lsGet('ft_budget', 0);
  state.balMode = lsGet('ft_balmode', 'mine');
  // migrate old entries: english categories + missing payment
  var changed = false;
  state.entries.forEach(function(e){
    if (LEGACY_CATS[e.category]) { e.category = LEGACY_CATS[e.category]; changed = true; }
    if (!e.payment) { e.payment = 'card2'; changed = true; }
  });
  if (changed) save();
}
function save() {
  lsSet('ft_entries', state.entries);
  lsSet('ft_apikey',  state.apiKey);
  lsSet('ft_budget',  state.budget);
  lsSet('ft_balmode', state.balMode);
}

// ── Date helpers ───────────────────────────────────────────────────────────
function isoOf(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function todayStr() { return isoOf(new Date()); }
function daysAgoStr(n) { var d = new Date(); d.setDate(d.getDate()-n); return isoOf(d); }
function monthOf(d) { return (d || '').substring(0, 7); }
function currentMonth() { return todayStr().substring(0,7); }
function prevMonth() {
  var n = new Date(), p = new Date(n.getFullYear(), n.getMonth()-1, 1);
  return isoOf(p).substring(0,7);
}
function fmtDate(d) {
  if (!d) return '';
  return new Date(d+'T12:00:00').toLocaleDateString('es-ES',{day:'2-digit',month:'short'});
}
function fmtMonthLabel(m) {
  if (!m) return '';
  var p = m.split('-');
  return new Date(p[0], p[1]-1, 1).toLocaleDateString('es-ES',{month:'long',year:'numeric'});
}
function dayLabel(d) {
  if (d === todayStr()) return 'Hoy';
  if (d === daysAgoStr(1)) return 'Ayer';
  return new Date(d+'T12:00:00').toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'short'});
}
function fmtEur(n) {
  return '€' + Math.abs(n).toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function signed(n) { return (n<0?'−':'+') + fmtEur(n); }
function uid() { return Date.now().toString() + Math.random().toString(36).slice(2,6); }
function sanitizeAmt(v) { return String(v).replace(/,/g,'.').replace(/[^0-9.]/g,''); }
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function norm(s) {
  return String(s).toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
}
function entriesSorted() {
  return state.entries.slice().sort(function(a,b){
    if (a.date !== b.date) return a.date < b.date ? 1 : -1;
    return b.id > a.id ? 1 : -1;
  });
}
function entriesForMode(mode) {
  return mode === 'mine' ? state.entries.filter(function(e){ return e.payment !== 'card1'; }) : state.entries;
}

// ── Categories (teen, Canarias) ────────────────────────────────────────────
var EXP_CATS = ['comida_snacks','transporte','ocio','ropa','tecnologia',
                'cuidado_personal','material_escolar','suscripciones','deporte_hobbies','otros'];
var INC_CATS = ['salario','freelance','otros'];

var CAT_LABELS = {
  comida_snacks:'Comida y snacks', transporte:'Transporte', ocio:'Ocio', ropa:'Ropa',
  tecnologia:'Tecnología', cuidado_personal:'Cuidado personal', material_escolar:'Material escolar',
  suscripciones:'Suscripciones', deporte_hobbies:'Deporte y hobbies', otros:'Otros',
  salario:'Salario', freelance:'Freelance'
};
var CAT_SHORT = {
  comida_snacks:'Comida', transporte:'Transporte', ocio:'Ocio', ropa:'Ropa',
  tecnologia:'Tecno', cuidado_personal:'Personal', material_escolar:'Escolar',
  suscripciones:'Suscrip.', deporte_hobbies:'Deporte', otros:'Otros',
  salario:'Salario', freelance:'Freelance'
};
function catLabel(c) { return CAT_LABELS[c] || c; }
function catShort(c) { return CAT_SHORT[c] || c; }

// Merchant map — tuned for a teen in Canarias. Keys must be pre-normalized (no accents, lowercase).
var MERCHANT_MAP = (function(){
  var m = {};
  function add(arr, cat){ arr.forEach(function(k){ m[k]=cat; }); }
  add(['hiperdino','superdino','dinosol','hipertrebol','mercadona','lidl','alcampo','spar',
       'coviran','carrefour express','aldi','mcdonald','mcdonalds','burger king','kfc','telepizza',
       'domino','pizza hut','papa john','tgb','foster','100 montaditos','rodilla','taco bell',
       'subway','goiko','five guys','starbucks','dunkin','llaollao','smooy','kebab','doner',
       'shawarma','guachinche','cafeteria','panaderia','dulceria','churreria','heladeria',
       'chuches','chucherias','golosinas','vending','bocadillo','pokebowl','poke house','sushi',
       'tagoror','bar '], 'comida_snacks');
  add(['guagua','guaguas','titsa','global','tranvia','metropolitano','ten+','tenmas','bono guagua',
       'taxi','cabify','uber','bolt','gasolinera','disa','cepsa','repsol','shell','galp',
       'binter','canaryfly','fred olsen','fred. olsen','naviera armas','armas','ferry',
       'parking','aparcamiento','renfe','blablacar'], 'transporte');
  add(['yelmo','ocine','multicines','cinesa','cine ','cines ','siam park','loro parque','aqualand',
       'palmitos','poema del mar','karting','bolera','ozone','billar','escape room','laser tag',
       'paintball','steam','epic games','playstation store','ps store','nintendo eshop','game.es',
       'twitch','ticketmaster','entradas.com','tomaticket','concierto','feria','discoteca',
       'recreativos','arcade'], 'ocio');
  add(['zara','bershka','pull&bear','pull and bear','stradivarius','primark','h&m','lefties',
       'mango','springfield','jack & jones','jack and jones','nike','adidas','jd sports',
       'foot locker','snipes','vans','converse','new balance','shein','vinted','zalando','asos',
       'oysho','women secret','calzedonia','tezenis','ale-hop','alehop'], 'ropa');
  add(['mediamarkt','media markt','worten','pccomponentes','apple store','k-tuin','ktuin',
       'xiaomi','samsung','jbl','logitech','razer','auriculares','cargador','power bank',
       'funda movil','cable usb','raton','teclado','hdmi','pendrive'], 'tecnologia');
  add(['fund grube','sabina','druni','primor','sephora','kiko','rituals','the body shop',
       'normal','peluqueria','barberia','barber','estetica','perfumeria','farmacia',
       'perfume','colonia','maquillaje','crema','champu','desodorante','gel de'], 'cuidado_personal');
  add(['papeleria','libreria','agapea','carlin','folder','casa del libro','copisteria',
       'fotocopias','libreta','boligrafo','calculadora','mochila escolar','material escolar',
       'apuntes','academia'], 'material_escolar');
  add(['spotify','netflix','disney','hbo','prime video','amazon prime','youtube premium',
       'crunchyroll','game pass','xbox game pass','ps plus','playstation plus','nintendo online',

  return m;
})();
var MERCHANT_KEYS = Object.keys(MERCHANT_MAP).sort(function(a,b){ return b.length - a.length; });

// Ambiguous merchants: name alone can't decide → IA (or otros)
var ALWAYS_ASK = ['amazon','aliexpress','temu','miravia','el corte ingles','fnac','paypal',
                  'bizum','app store','apple.com/bill','google play','wallapop','carrefour',
                  'revolut','n26','transferencia'];

function matchToken(d, tok) {
  if (tok.length >= 5) return d.indexOf(tok) !== -1;
  var safe = tok.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return new RegExp('(^|[^a-z0-9])' + safe + '($|[^a-z0-9])').test(d);
}

function localCatLookup(description) {
  var d = norm(description);
  // 1. exact merchant matches (longest key first → "amazon prime" beats "amazon")
  for (var j = 0; j < MERCHANT_KEYS.length; j++) {
    if (matchToken(d, MERCHANT_KEYS[j])) return MERCHANT_MAP[MERCHANT_KEYS[j]];
  }
  // 2. ambiguous merchants → null (Claude decides, or otros)
  for (var i = 0; i < ALWAYS_ASK.length; i++) {
    if (d.indexOf(ALWAYS_ASK[i]) !== -1) return null;
  }
  // 3. keyword inference
  if (/caf[e]|resto|burger|pizza|taco|brunch|desayun|merienda|cena |comida|almuerzo|helado|churro|tapas|menu|fruta|super(mercado)?/.test(d)) return 'comida_snacks';
  if (/bus |autobus|gasolina|barco|vuelo|avion|peaje|coche/.test(d)) return 'transporte';
  if (/peli|cine|juego|videojuego|fiesta|salida|plan |bolos|entrada/.test(d)) return 'ocio';
  if (/ropa|camis|pantal|zapat|sudader|chaqueta|vestido|falda|calcet|moda|sneaker|bambas|abrigo/.test(d)) return 'ropa';
  if (/movil|telefono|ordenador|portatil|tablet|tech|gadget|electronica|consola/.test(d)) return 'tecnologia';
  if (/pelo|corte de|crema|cosmetic|higiene|desodorante|cuidado/.test(d)) return 'cuidado_personal';
  if (/clase|colegio|instituto|escola|libro|examen|deberes|curso/.test(d)) return 'material_escolar';
  if (/suscri|premium|cuota|plan mensual/.test(d)) return 'suscripciones';
  if (/deporte|entren|partido|gimnas|natacion|baloncesto|tenis|hobby/.test(d)) return 'deporte_hobbies';
  return null;
}

// ── Anthropic API ──────────────────────────────────────────────────────────
async function callClaude(prompt, maxTokens) {
  if (!state.apiKey) throw new Error('NO_KEY');
  var res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': state.apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: maxTokens || 256,
      messages: [{ role:'user', content:prompt }]
    })
  });
  var data = await res.json();
  if (!res.ok) throw new Error(data.error && data.error.message || 'HTTP '+res.status);
  return data.content[0].text.trim();
}

async function inferCategory(description, type) {
  var d = norm(description);
  if (type === 'income') {
    if (/nomina|sueldo|salario|trabajo|curro|empresa/.test(d)) return 'salario';
    if (/freelance|proyecto|cliente|factura|encargo/.test(d)) return 'freelance';
    if (/paga|regalo|cumple|navidad|reyes|bizum|venta|devolucion/.test(d)) return 'otros';
    if (!state.apiKey) return 'otros';
    try {
      var r = await callClaude(
        'Classify this income into exactly one id: salario, freelance, otros.\n' +
        'Transaction: "' + description + '"\nReply with ONLY the id.', 16);
      return INC_CATS.indexOf(r) !== -1 ? r : 'otros';
    } catch(e) { return 'otros'; }
  }
  var local = localCatLookup(description);
  if (local) return local;
  if (!state.apiKey) return 'otros';
  try {
    var r2 = await callClaude(
      'Categorize an expense made by a 16-year-old living in the Canary Islands (Spain).\n' +
      'Pick exactly ONE id from: ' + EXP_CATS.join(', ') + '\n' +
      'Meanings: comida_snacks=food/supermarket/snacks/cafes; transporte=guagua/bus/taxi/ferry/fuel; ' +
      'ocio=cinema/games/outings/theme parks; ropa=clothing/shoes/fashion; tecnologia=gadgets/accessories; ' +
      'cuidado_personal=haircut/cosmetics/pharmacy; material_escolar=school supplies/books; ' +
      'suscripciones=recurring services (Spotify, Netflix, phone plan); deporte_hobbies=gym/sports/hobby gear; ' +
      'otros=only if truly impossible to tell.\n' +
      'Avoid "otros" whenever a reasonable guess exists.\n' +
      'Transaction: "' + description + '"\nReply with ONLY the id.', 20);
    return EXP_CATS.indexOf(r2) !== -1 ? r2 : 'otros';
  } catch(e) { return 'otros'; }
}

// ── Visual builders ────────────────────────────────────────────────────────
function buildDonut(segments, size) {
  if (!segments || !segments.length) return '';
  size = size || 140;
  var cx = size/2, cy = size/2;
  var outerR = size/2 - 6, innerR = Math.round(outerR * 0.58);
  var total = segments.reduce(function(s,d){ return s+d.v; }, 0);
  if (!total) return '';
  if (segments.length === 1) {
    var g = segments[0].g;
    return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">'+
      '<circle cx="'+cx+'" cy="'+cy+'" r="'+outerR+'" fill="rgb('+g+','+g+','+g+')"/>'+
      '<circle cx="'+cx+'" cy="'+cy+'" r="'+innerR+'" fill="#000"/></svg>';
  }
  var paths='', angle=-Math.PI/2, gapA=0.03;
  segments.forEach(function(seg){
    var sweep=(seg.v/total)*Math.PI*2;
    var a1=angle+gapA/2, a2=angle+sweep-gapA/2;
    if (a2<=a1){angle+=sweep;return;}
    var lg=(sweep-gapA)>Math.PI?1:0;
    var x1o=(cx+outerR*Math.cos(a1)).toFixed(2),y1o=(cy+outerR*Math.sin(a1)).toFixed(2);
    var x2o=(cx+outerR*Math.cos(a2)).toFixed(2),y2o=(cy+outerR*Math.sin(a2)).toFixed(2);
    var x1i=(cx+innerR*Math.cos(a2)).toFixed(2),y1i=(cy+innerR*Math.sin(a2)).toFixed(2);
    var x2i=(cx+innerR*Math.cos(a1)).toFixed(2),y2i=(cy+innerR*Math.sin(a1)).toFixed(2);
    paths+='<path d="M'+x1o+','+y1o+' A'+outerR+','+outerR+' 0 '+lg+',1 '+x2o+','+y2o+
           ' L'+x1i+','+y1i+' A'+innerR+','+innerR+' 0 '+lg+',0 '+x2i+','+y2i+
           ' Z" fill="rgb('+seg.g+','+seg.g+','+seg.g+')"/>';
    angle+=sweep;
  });
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">'+paths+'</svg>';
}

function buildTrendChart(ents) {
  var months=[], now=new Date();
  for (var i=5;i>=0;i--) {
    var d=new Date(now.getFullYear(),now.getMonth()-i,1);
    var key=isoOf(d).substring(0,7);
    var lbl=d.toLocaleDateString('es-ES',{month:'short'}).replace('.','');
    var inc=0,exp=0;
    ents.forEach(function(e){
      if(monthOf(e.date)===key){ if(e.type==='income')inc+=e.amount; else exp+=e.amount; }
    });
    months.push({label:lbl,inc:inc,exp:exp});
  }
  if (!months.some(function(m){return m.inc>0||m.exp>0;})) return '';
  var W=353,H=72,bW=13,gap=3,colW=W/6;
  var maxVal=months.reduce(function(mx,m){return Math.max(mx,m.inc,m.exp);},1);
  var items='';
  months.forEach(function(m,i){
    var cx=i*colW+colW/2,incH=(m.inc/maxVal)*H,expH=(m.exp/maxVal)*H;
    var anim='style="transform-origin:center bottom;transform-box:fill-box;animation:riseY .5s ease both;animation-delay:'+(i*60)+'ms"';
    if(m.inc>0) items+='<rect '+anim+' x="'+(cx-bW-gap/2).toFixed(1)+'" y="'+(H-incH).toFixed(1)+'" width="'+bW+'" height="'+incH.toFixed(1)+'" rx="3" fill="#3a3a3a"/>';
    if(m.exp>0) items+='<rect '+anim+' x="'+(cx+gap/2).toFixed(1)+'" y="'+(H-expH).toFixed(1)+'" width="'+bW+'" height="'+expH.toFixed(1)+'" rx="3" fill="#888"/>';
    items+='<text x="'+cx.toFixed(1)+'" y="'+(H+14)+'" text-anchor="middle" font-size="9" fill="#3a3a3a" font-family="-apple-system,Helvetica Neue,sans-serif">'+m.label+'</text>';
  });
  return '<svg width="100%" height="'+(H+18)+'" viewBox="0 0 '+W+' '+(H+18)+'" preserveAspectRatio="xMidYMid meet">'+items+'</svg>';
}

// Cumulative balance, last 30 days
function buildBalanceChart(ents) {
  if (!ents.length) return '';
  var startStr = daysAgoStr(29);
  var base = 0, byDay = {};
  ents.forEach(function(e){
    var v = e.type==='income' ? e.amount : -e.amount;
    if (e.date < startStr) base += v;
    else byDay[e.date] = (byDay[e.date]||0) + v;
  });
  var pts=[], run=base;
  for (var i=29;i>=0;i--) {
    run += (byDay[daysAgoStr(i)]||0);
    pts.push(run);
  }
  var W=353,H=82,P=6;
  var min=Math.min.apply(null,pts), max=Math.max.apply(null,pts);
  if (max-min < 1) { max+=1; min-=1; }
  function X(i){ return P+i*(W-2*P)/29; }
  function Y(v){ return P+(H-2*P)*(1-(v-min)/(max-min)); }
  var line=pts.map(function(v,i){ return (i?'L':'M')+X(i).toFixed(1)+','+Y(v).toFixed(1); }).join('');
  var area=line+' L'+X(29).toFixed(1)+','+(H-P)+' L'+X(0).toFixed(1)+','+(H-P)+' Z';
  var zero='';
  if (min<0 && max>0) {
    zero='<line x1="'+P+'" y1="'+Y(0).toFixed(1)+'" x2="'+(W-P)+'" y2="'+Y(0).toFixed(1)+'" stroke="#222" stroke-width="1" stroke-dasharray="3,4"/>';
  }
  var lastX=X(29).toFixed(1), lastY=Y(pts[29]).toFixed(1);
  return '<svg width="100%" height="'+H+'" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet">'+
    '<defs><linearGradient id="balgrad" x1="0" y1="0" x2="0" y2="1">'+
    '<stop offset="0%" stop-color="#ffffff" stop-opacity="0.10"/>'+
    '<stop offset="100%" stop-color="#ffffff" stop-opacity="0"/></linearGradient></defs>'+
    zero+
    '<path d="'+area+'" fill="url(#balgrad)"/>'+
    '<path d="'+line+'" fill="none" stroke="#cfcfcf" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round" stroke-dasharray="600" style="animation:drawLine 1s ease both"/>'+
    '<circle cx="'+lastX+'" cy="'+lastY+'" r="3" fill="#fff"/>'+
    '</svg>';
}

function animateNum(el, from, to) {
  var start = null, dur = 550;
  function tick(t){
    if (!start) start = t;
    var p = Math.min(1,(t-start)/dur);
    p = 1 - Math.pow(1-p, 3);
    var v = from + (to-from)*p;
    el.textContent = signed(v);
    if (p < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

function sumBy(list, type) {
  return list.filter(function(e){ return e.type===type; }).reduce(function(s,e){ return s+e.amount; },0);
}

function renderDashboard() {
  var mode = state.balMode;
  var entsM = entriesForMode(mode);
  var entsAll = state.entries;
  var cm = currentMonth();

  var balMine = sumBy(entriesForMode('mine'),'income') - sumBy(entriesForMode('mine'),'expense');
  var balAll  = sumBy(entsAll,'income') - sumBy(entsAll,'expense');
  var bal     = mode==='mine' ? balMine : balAll;
  var other   = mode==='mine' ? balAll : balMine;
  var otherLbl= mode==='mine' ? 'Con T. Tía' : 'Solo mío';

  var cmE = entsM.filter(function(e){ return monthOf(e.date)===cm; });
  var mInc = sumBy(cmE,'income'), mExp = sumBy(cmE,'expense'), mNet = mInc-mExp;
  var savRate = mInc>0 ? Math.max(0,Math.round((mNet/mInc)*100)) : null;

  // Donut (month expenses by category, mode-filtered)
  var byCat={};
  cmE.filter(function(e){return e.type==='expense';}).forEach(function(e){ byCat[e.category]=(byCat[e.category]||0)+e.amount; });

// ── Swipe-to-delete + tap-to-edit ──────────────────────────────────────────
var _swipeOpen = null;

function closeSwipeRow(id) {
  var row = document.querySelector('.swipe-row[data-id="'+id+'"]');
  if (row) { row.style.transition='transform .25s ease'; row.style.transform='translateX(0)'; }
  if (_swipeOpen===id) _swipeOpen=null;
}

function attachSwipeListeners() {
  var REVEAL = 88;
  document.querySelectorAll('.swipe-row').forEach(function(row) {
    var id = row.dataset.id;
    var sx=0, sy=0, isHoriz=false, decided=false, wasOpen=false, suppressClick=false;

    row.addEventListener('touchstart', function(e) {
      if (_swipeOpen && _swipeOpen!==id) closeSwipeRow(_swipeOpen);
      sx=e.touches[0].clientX; sy=e.touches[0].clientY;
      isHoriz=false; decided=false;
      wasOpen=(_swipeOpen===id);
      row.style.transition='none';
    }, {passive:true});

    row.addEventListener('touchmove', function(e) {
      var dx=e.touches[0].clientX-sx, dy=e.touches[0].clientY-sy;
      if (!decided) {
        if (Math.abs(dx)<5 && Math.abs(dy)<5) return;
        isHoriz=Math.abs(dx)>Math.abs(dy);
        decided=true;
      }
      if (!isHoriz) return;
      e.preventDefault();
      var base=wasOpen?-REVEAL:0;
      var trans=Math.min(0, Math.max(base+dx, -REVEAL));
      row.style.transform='translateX('+trans+'px)';
    }, {passive:false});

    row.addEventListener('touchend', function() {
      if (!decided||!isHoriz) return;
      suppressClick=true;
      setTimeout(function(){ suppressClick=false; }, 400);
      var mat=getComputedStyle(row).transform;
      var cur=mat==='none'?0:new DOMMatrix(mat).m41;
      row.style.transition='transform .25s ease';
      if (cur < -REVEAL*0.4) {
        row.style.transform='translateX(-'+REVEAL+'px)';
        _swipeOpen=id;
      } else {
        row.style.transform='translateX(0)';
        if (_swipeOpen===id) _swipeOpen=null;
      }
    }, {passive:true});

    row.addEventListener('click', function() {
      if (suppressClick) return;
      if (_swipeOpen) {
        if (_swipeOpen!==id) closeSwipeRow(_swipeOpen);
        else closeSwipeRow(id);
        return;
      }
      openEditModal(id);
    });
  });

  document.addEventListener('touchstart', function(e) {
    if (!_swipeOpen) return;
    var wrap=document.querySelector('[data-wrapid="'+_swipeOpen+'"]');
    if (wrap && !wrap.contains(e.target)) closeSwipeRow(_swipeOpen);
  }, {passive:true});
}

function updateApiKey(v) { state.apiKey=v; lsSet('ft_apikey',v); }
function updateBudget(v) {
  var n=parseFloat(sanitizeAmt(v));
  state.budget=(isNaN(n)||n<=0)?0:n; lsSet('ft_budget',state.budget);

function updateClearBtn(v) {
  var btn=document.getElementById('clear-btn'); if(!btn)return;

function doClear() {

function downloadBlob(content, type, name) {
  var b=new Blob([content],{type:type});
  var u=URL.createObjectURL(b);
  var a=document.createElement('a');
  a.href=u; a.download=name;
  document.body.appendChild(a); a.click();
  setTimeout(function(){ URL.revokeObjectURL(u); a.remove(); }, 600);
}
function exportCsv() {
  var rows=[['Fecha','Tipo','Descripción','Categoría','Pago','Importe']];
  entriesSorted().forEach(function(e){
    rows.push([e.date, e.type==='income'?'Ingreso':'Gasto', e.description,
               catLabel(e.category), PAYMENTS[e.payment].label,
               (e.type==='income'?'':'-')+String(e.amount.toFixed(2)).replace('.',',')]);
  });
  var csv='﻿'+rows.map(function(r){
    return r.map(function(c){ return '"'+String(c).replace(/"/g,'""')+'"'; }).join(';');
  }).join('\r\n');
  downloadBlob(csv,'text/csv;charset=utf-8','finanzas_'+todayStr()+'.csv');
}
function exportJson() {
  downloadBlob(JSON.stringify({entries:state.entries,budget:state.budget},null,1),
    'application/json','finanzas_backup_'+todayStr()+'.json');
}
function doRestore() {
  var ta=document.getElementById('restore-text'), st=document.getElementById('restore-status');
  if(!ta||!ta.value.trim())return;
  try {
    var data=JSON.parse(ta.value.trim());
    var ents=Array.isArray(data)?data:data.entries;
    if(!Array.isArray(ents)) throw new Error('formato');
    var clean=ents.filter(function(e){ return e && e.description && e.amount>0 && e.date; })
      .map(function(e){
        return { id:e.id||uid(), type:e.type==='income'?'income':'expense',
          amount:Number(e.amount), description:String(e.description),
          category:LEGACY_CATS[e.category]||e.category||'otros',
          payment:PAY_IDS.indexOf(e.payment)!==-1?e.payment:'card2',
          date:String(e.date).substring(0,10) };
      });
    state.entries=clean;
    if(data.budget>0) state.budget=Number(data.budget);
    save();
    if(st) st.textContent='✓ Restaurados '+clean.length+' movimientos';
    setTimeout(render,600);
  } catch(e) {
    if(st) st.textContent='JSON no válido — copia el archivo entero';
  }
}

async function doImport() {
  var textEl=document.getElementById('import-text'), errEl=document.getElementById('import-error');
  var btn=document.getElementById('import-btn'), conf=document.getElementById('import-confirm');
  if(!textEl||!textEl.value.trim())return;
  var txt=textEl.value.trim();
  if(errEl)errEl.textContent=''; if(conf)conf.className='';
  if(btn){btn.textContent='Procesando…';btn.style.opacity='0.6';}
  var parsed=null;
  // local parse first — amount + merchant lookup
  var m=txt.match(/(\d+)[,.](\d{1,2})\s*€|€\s*(\d+)[,.](\d{1,2})|(\d+)[,.](\d{1,2})/);
  if (m) {
    var amt=parseFloat((m[1]||m[3]||m[5])+'.'+(m[2]||m[4]||m[6]));
    var localCat=localCatLookup(txt);
    if (localCat) {
      var words=txt.replace(/[€$£\d.,\-+:«»"]/g,' ').replace(/\s+/g,' ').trim().split(' ').filter(Boolean);
      parsed={type:'expense',amount:amt,description:words.slice(0,4).join(' ').substring(0,30)||'Importado',category:localCat,payment:'card2'};
    }
  }
  if (!parsed && state.apiKey) {
    try{
      var r=await callClaude(
        'Extract a financial transaction from the text below.\nReturn ONLY a valid JSON object:\n'+
        '{"type":"expense","amount":24.50,"description":"HiperDino","category":"comida_snacks"}\n'+
        'Rules: type is "expense" or "income". amount is a number (Spanish "24,50" means 24.50). description max 30 chars (merchant name). '+
        'category one of: comida_snacks, transporte, ocio, ropa, tecnologia, cuidado_personal, material_escolar, suscripciones, deporte_hobbies, otros, salario, freelance.\n\n'+
        'Text: "'+txt.substring(0,400)+'"\n\nReturn ONLY the JSON.',128);
      var clean=r.replace(/```(?:json)?\n?|```\n?/g,'').trim();
      var p=JSON.parse(clean);
      if(p.amount>0&&p.description){ p.payment='card2'; parsed=p; }
    }catch(e){}
  }
  if (!parsed && m) {
    var amt2=parseFloat((m[1]||m[3]||m[5])+'.'+(m[2]||m[4]||m[6]));
    var words2=txt.replace(/[€$£\d.,\-+:«»"]/g,' ').replace(/\s+/g,' ').trim().split(' ').filter(Boolean);
    parsed={type:'expense',amount:amt2,description:words2.slice(0,4).join(' ').substring(0,30)||'Importado',category:'otros',payment:'card2'};
  }
  if(btn){btn.textContent='Analizar texto';btn.style.opacity='1';}
  if(parsed){
    state.importParsed=parsed;
    if(conf){conf.innerHTML=renderImportConfirm(parsed);conf.className='show';}
  } else {
    if(errEl)errEl.textContent='No se pudo detectar ningún importe. Añade manualmente con el botón +.';
  }
}
function confirmImport() {
  if(!state.importParsed)return;
  var p=state.importParsed;
  state.entries.unshift({id:uid(),type:p.type,amount:Number(p.amount),description:p.description,
    category:p.category,payment:p.payment||'card2',date:todayStr()});
  save(); state.importParsed=null;
  var t=document.getElementById('import-text'); if(t)t.value='';
  var c=document.getElementById('import-confirm'); if(c)c.className='';
  render();
}
function cancelImport() {
  state.importParsed=null;
  var c=document.getElementById('import-confirm'); if(c)c.className='';
}

// ── Listeners per tab ──────────────────────────────────────────────────────
function attachListeners(tab) {
  if (tab===0) {
    var h=document.getElementById('hero-bal');
    if (h) {
      var target=parseFloat(h.dataset.v)||0;
      var from=(typeof window.__hb==='number')?window.__hb:0;
      if (from!==target) animateNum(h, from, target);
      window.__hb=target;
    }
  }
  if (tab===1) attachSwipeListeners();
  if (tab===3) {
    var ta=document.getElementById('import-text'), btn=document.getElementById('import-btn');
    if(ta&&btn){
      ta.addEventListener('input',function(){
        var has=ta.value.trim().length>0;
        btn.style.background=has?'#1a1a1a':'#0d0d0d';
        btn.style.color=has?'#888':'#2a2a2a';
      });
    }
  }
}

// ── URL params (Apple Pay Shortcut) ────────────────────────────────────────
function parseUrlParams() {
  var p=new URLSearchParams(window.location.search);
  if(p.get('action')==='add'){
    var init={
      type:p.get('type')||'expense',
      amount:p.get('amount')||'',
      description:p.get('description')||'',
      payment:PAY_IDS.indexOf(p.get('payment'))!==-1?p.get('payment'):'card2'
    };
    window.history.replaceState({},'',window.location.pathname);
    openAddModal(init);
  }
}
