<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Finance">
<title>Finance</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#000;overscroll-behavior:none}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Helvetica Neue',sans-serif;color:#fff;overflow-x:hidden;-webkit-font-smoothing:antialiased}
input,textarea,button{font-family:inherit}
::-webkit-scrollbar{display:none}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}

/* Layout */
#app{max-width:393px;margin:0 auto;min-height:100vh;background:#000;position:relative}
#content{padding-bottom:80px;min-height:100vh}

/* Tab bar */
#tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:393px;background:rgba(0,0,0,0.96);border-top:1px solid #141414;backdrop-filter:blur(20px);display:flex;padding-bottom:env(safe-area-inset-bottom,0px);z-index:100}
.tab-btn{flex:1;padding:10px 0 9px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;min-height:56px}
.tab-icon{font-size:22px;opacity:.22;transition:opacity .15s}
.tab-icon.active{opacity:1}
.tab-label{font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:#3a3a3a;transition:color .15s}
.tab-label.active{color:#fff}

/* FAB */
#fab{position:fixed;bottom:calc(64px + env(safe-area-inset-bottom,0px));right:max(16px,calc(50% - 196px + 16px));width:56px;height:56px;border-radius:50%;background:#fff;color:#000;border:none;font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 28px rgba(255,255,255,.18);z-index:90;line-height:1}

/* Overlay */
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .2s}
#overlay.show{opacity:1;pointer-events:all}
#modal{background:#0d0d0d;border-radius:20px 20px 0 0;width:100%;border-top:1px solid #1e1e1e;padding:0 20px;padding-bottom:calc(env(safe-area-inset-bottom,0px) + 24px);transform:translateY(100%);transition:transform .25s cubic-bezier(.32,.72,0,1)}
#overlay.show #modal{transform:translateY(0)}

/* Common */
.section-label{font-size:10px;color:#555;letter-spacing:.12em;text-transform:uppercase}
.card{background:#090909;border:1px solid #181818;border-radius:12px;padding:16px}
.input-field{width:100%;background:#111;border:1px solid #1c1c1c;border-radius:8px;padding:12px 14px;color:#fff;font-size:14px;outline:none}
.input-field::placeholder{color:#333}
textarea.input-field{resize:none;line-height:1.55}
.btn-primary{width:100%;padding:16px;background:#fff;color:#000;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:-.3px;min-height:54px}
.btn-secondary{background:#1a1a1a;color:#666;border:none;border-radius:8px;font-size:14px;cursor:pointer;min-height:44px}
.pill{flex:1;padding:10px 0;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;min-height:44px;transition:background .15s,color .15s}
.pill.active{background:#fff;color:#000}
.pill.inactive{background:#111;color:#555}

/* Entry row */
.entry-row{display:flex;justify-content:space-between;align-items:center;padding:13px 0;min-height:60px}
.entry-desc{font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.entry-meta{font-size:12px;color:#444;margin-top:3px}
.entry-amount{font-size:16px;font-weight:700;white-space:nowrap;margin-left:12px}
.amount-income{color:#e8e8e8}
.amount-expense{color:#666}

/* Swipe-to-delete */
.swipe-wrap{position:relative;overflow:hidden;border-bottom:1px solid #0f0f0f}
.swipe-row{position:relative;z-index:1;background:#000;will-change:transform;touch-action:pan-y}
.swipe-del{position:absolute;right:0;top:0;bottom:0;width:88px;background:#1c1c1c;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:0}
.swipe-del span{font-size:12px;font-weight:700;color:#888;letter-spacing:.04em;text-transform:uppercase}

/* Bar chart */
.bar-bg{height:6px;background:#0d0d0d;border-radius:3px}
.bar-fill{height:100%;border-radius:3px;transition:width .4s ease}

/* Toggle */
.toggle-wrap{display:flex;background:#181818;border-radius:10px;padding:4px;margin-bottom:18px}
.toggle-btn{flex:1;padding:11px 0;border-radius:7px;border:none;cursor:pointer;font-size:15px;font-weight:700;min-height:44px;transition:background .15s,color .15s}
.toggle-btn.active{background:#fff;color:#000}
.toggle-btn.inactive{background:transparent;color:#444}

/* Filter strip */
.filter-strip{display:flex;gap:8px;padding:10px 20px;position:sticky;top:0;background:#000;z-index:10;border-bottom:1px solid #0d0d0d}

/* Analysis */
.analysis-item{margin-bottom:22px}

/* Search */
.search-wrap{padding:10px 20px;background:#000;border-bottom:1px solid #0d0d0d}
.search-input{width:100%;background:#111;border:1px solid #1a1a1a;border-radius:10px;padding:10px 14px;color:#fff;font-size:14px;outline:none}
.search-input::placeholder{color:#333}

/* Budget bar */
.budget-track{height:4px;background:#1a1a1a;border-radius:2px;overflow:hidden}
.budget-fill{height:100%;border-radius:2px;transition:width .5s ease}

/* Confirm import */
#import-confirm{margin-top:12px;background:#111;border-radius:8px;padding:14px;display:none}
#import-confirm.show{display:block}

/* Print */
@media print{
  .no-print{display:none!important}
  .print-only{display:block!important}
  body{background:#fff!important;color:#000!important}
}
.print-only{display:none}
</style>
</head>
<body>
<div id="app">
  <div id="content"></div>

  <nav id="tabbar" class="no-print">
    <button class="tab-btn" onclick="setTab(0)">
      <span class="tab-icon active" id="ti0">⊡</span>
      <span class="tab-label active" id="tl0">Inicio</span>
    </button>
    <button class="tab-btn" onclick="setTab(1)">
      <span class="tab-icon" id="ti1">≡</span>
      <span class="tab-label" id="tl1">Movimientos</span>
    </button>
    <button class="tab-btn" onclick="setTab(2)">
      <span class="tab-icon" id="ti2">◎</span>
      <span class="tab-label" id="tl2">Análisis</span>
    </button>
    <button class="tab-btn" onclick="setTab(3)">
      <span class="tab-icon" id="ti3">↑</span>
      <span class="tab-label" id="tl3">Exportar</span>
    </button>
  </nav>

  <button id="fab" class="no-print" onclick="openAddModal()">+</button>

  <!-- Add Modal -->
  <div id="overlay" onclick="handleOverlayClick(event)">
    <div id="modal">
      <div style="width:36px;height:4px;background:#2a2a2a;border-radius:2px;margin:14px auto 22px"></div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:22px">
        <div style="font-size:20px;font-weight:800;letter-spacing:-.8px">Nueva entrada</div>
        <button onclick="closeModal()" style="background:#1a1a1a;border:none;color:#666;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center">×</button>
      </div>
      <div class="toggle-wrap">
        <button id="toggle-expense" class="toggle-btn active" onclick="setEntryType('expense')">Gasto</button>
        <button id="toggle-income"  class="toggle-btn inactive" onclick="setEntryType('income')">Ingreso</button>
      </div>
      <div style="margin-bottom:14px">
        <div class="section-label" style="margin-bottom:7px">Importe (€)</div>
        <div style="position:relative">
          <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:24px;color:#333;font-weight:700;pointer-events:none">€</span>
          <input id="modal-amount" type="text" inputmode="decimal" placeholder="0,00"
            style="width:100%;background:#111;border:1px solid #1c1c1c;border-radius:10px;padding:15px 14px 15px 40px;color:#fff;font-size:30px;font-weight:800;outline:none;letter-spacing:-1.5px"
            oninput="validateModal()" onkeydown="if(event.key==='Enter')submitEntry()">
        </div>
      </div>
      <div style="margin-bottom:22px">
        <div class="section-label" style="margin-bottom:7px">Descripción</div>
        <input id="modal-desc" type="text" placeholder="Ej: Mercadona, Netflix, Taxi…"
          style="width:100%;background:#111;border:1px solid #1c1c1c;border-radius:10px;padding:14px;color:#fff;font-size:16px;outline:none"
          oninput="validateModal()" onkeydown="if(event.key==='Enter')submitEntry()">
      </div>
      <button id="modal-save" onclick="submitEntry()"
        style="width:100%;padding:17px;background:#141414;color:#2a2a2a;border:none;border-radius:12px;font-size:16px;font-weight:800;cursor:default;letter-spacing:-.3px;min-height:54px">
        Guardar
      </button>
      <div id="modal-status" style="text-align:center;font-size:12px;color:#3a3a3a;margin-top:9px;min-height:18px"></div>
    </div>
  </div>

  <div class="print-only" id="print-view"></div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
var state = {
  entries: [],
  apiKey: '',
  activeTab: 0,
  entryType: 'expense',
  filter: 'all',
  searchQ: '',
  importParsed: null,
  analysisResult: '',
  budget: 0
};

// ── Storage ────────────────────────────────────────────────────────────────
function lsGet(k, fb) {
  try { var v = localStorage.getItem(k); return v != null ? JSON.parse(v) : fb; } catch(e) { return fb; }
}
function lsSet(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {} }
function load() {
  state.entries = lsGet('ft_entries', []);
  state.apiKey  = lsGet('ft_apikey', '');
  state.budget  = lsGet('ft_budget', 0);
}
function save() {
  lsSet('ft_entries', state.entries);
  lsSet('ft_apikey',  state.apiKey);
  lsSet('ft_budget',  state.budget);
}

// ── Date helpers ───────────────────────────────────────────────────────────
function todayStr() { return new Date().toISOString().split('T')[0]; }
function monthOf(d) { return (d || '').substring(0, 7); }
function currentMonth() {
  var n = new Date();
  return n.getFullYear() + '-' + String(n.getMonth()+1).padStart(2,'0');
}
function prevMonth() {
  var n = new Date(), p = new Date(n.getFullYear(), n.getMonth()-1, 1);
  return p.getFullYear() + '-' + String(p.getMonth()+1).padStart(2,'0');
}
function fmtDate(d) {
  if (!d) return '';
  return new Date(d+'T12:00:00').toLocaleDateString('es-ES',{day:'2-digit',month:'short'});
}
function fmtMonthLabel(m) {
  if (!m) return '';
  var p = m.split('-');
  return new Date(p[0], p[1]-1, 1).toLocaleDateString('es-ES',{month:'long',year:'numeric'});
}
function fmtEur(n) {
  return '€' + Math.abs(n).toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function uid() { return Date.now().toString() + Math.random().toString(36).slice(2,6); }
function sanitizeAmt(v) { return String(v).replace(/,/g,'.').replace(/[^0-9.]/g,''); }
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Category system (teen-expense-categorizer skill) ───────────────────────
var EXP_CATS = [
  'comida_snacks','transporte','ocio','ropa','tecnologia',
  'cuidado_personal','material_escolar','suscripciones','deporte_hobbies','otros'
];
var INC_CATS = ['salario','freelance','otros'];

// Display labels (handles new IDs and legacy English names)
function catLabel(cat) {
  var map = {
    comida_snacks:'Comida',transporte:'Transporte',ocio:'Ocio',
    ropa:'Ropa',tecnologia:'Tecnología',cuidado_personal:'Cuidado personal',
    material_escolar:'Material escolar',suscripciones:'Suscripciones',
    deporte_hobbies:'Deporte',otros:'Otros',salario:'Salario',freelance:'Freelance',
    // legacy English
    Food:'Comida',Transport:'Transporte',Subscriptions:'Suscripciones',
    Health:'Salud',Shopping:'Compras',Other:'Otros',Salary:'Salario',Freelance:'Freelance'
  };
  return map[cat] || cat;
}

// Local merchant-map (fast, no API key needed for known merchants)
var MERCHANT_MAP = (function(){
  var m = {};
  // comida_snacks
  ['mcdonald','burger king','kfc','telepizza','domino','pizza hut','five guys','goiko',
   'tgb','foster','100 montaditos','rodilla','pans','taco bell','starbucks','dunkin',
   'costa coffee','llaollao','smooy','mercadona','carrefour express','dia','lidl',
   'alcampo','vending','chuche','kebab','döner','bubble tea','cafeteria','cafetería',
   'panaderia','panadería','heladeria','heladería'
  ].forEach(function(k){ m[k]='comida_snacks'; });
  // transporte
  ['metro','emt','crtm','renfe','cercanias','alsa','avanza','bicimad','uber','cabify',
   'bolt','freenow','taxi','blablacar','repsol','cepsa','bp','galp','gasolinera',
   'parking','abono joven','abono trans'
  ].forEach(function(k){ m[k]='transporte'; });
  // ocio
  ['cinesa','yelmo','kinepolis','steam','epic games','playstation store','ps store',
   'nintendo eshop','game.es','twitch','ticketmaster','entradas.com','bolera',
   'bowling','escape room','laser tag','paintball','parque warner','portaventura'
  ].forEach(function(k){ m[k]='ocio'; });
  // ropa
  ['zara','bershka','pull&bear','stradivarius','massimo dutti','oysho','lefties',
   'h&m','primark','mango','springfield','nike','adidas','jd sports','foot locker',
   'snipes','vans','converse','new balance','shein','asos','zalando','claire'
  ].forEach(function(k){ m[k]='ropa'; });
  // tecnologia
  ['apple store','mediamarkt','pccomponentes','worten','logitech','razer','jbl',
   'auricular','cargador','power bank','funda movil','cable usb'
  ].forEach(function(k){ m[k]='tecnologia'; });
  // cuidado_personal
  ['sephora','kiko','primor','druni','rituals','the body shop','peluqueria',
   'peluquería','barberia','barbería','estetica','estética','arenal'
  ].forEach(function(k){ m[k]='cuidado_personal'; });
  // material_escolar
  ['carlin','folder','abacus','papeleria','papelería','libreria','librería',
   'casa del libro','material escolar'
  ].forEach(function(k){ m[k]='material_escolar'; });
  // suscripciones
  ['spotify','netflix','disney+','disney plus','hbo','max ','youtube premium',
   'crunchyroll','game pass','xbox game pass','ps plus','nintendo switch online',
   'icloud','google one','dropbox','canva pro','chatgpt plus','claude pro',
   'duolingo super','patreon','amazon prime'
  ].forEach(function(k){ m[k]='suscripciones'; });
  // deporte_hobbies
  ['basic-fit','mcfit','vivagym','anytime fitness','synergym','decathlon',
   'forum sport','padel','pádel','futbol sala','hsn','prozis','thomann','gym '
  ].forEach(function(k){ m[k]='deporte_hobbies'; });
  return m;
})();

// Merchants where name alone isn't enough — always ask Claude
var ALWAYS_ASK = ['amazon','aliexpress','el corte ingles','fnac','paypal',
                  'bizum','app store','google play','wallapop','apple.com/bill'];

function localCatLookup(description) {
  var d = description.toLowerCase();
  // Check always-ask first
  for (var i = 0; i < ALWAYS_ASK.length; i++) {
    if (d.indexOf(ALWAYS_ASK[i]) !== -1) return null; // force Claude
  }
  var keys = Object.keys(MERCHANT_MAP);
  for (var j = 0; j < keys.length; j++) {
    if (d.indexOf(keys[j]) !== -1) return MERCHANT_MAP[keys[j]];
  }
  // Inference hints
  if (/caf[eé]|bar |resto|burger|pizza|kebab/.test(d)) return 'comida_snacks';
  if (/moda|shoe|wear|boutique/.test(d)) return 'ropa';
  if (/transport|movilidad|mobility|rent.?a/.test(d)) return 'transporte';
  if (/fitness|sport|gym/.test(d)) return 'deporte_hobbies';
  return null; // unknown → ask Claude
}

// ── Anthropic API ──────────────────────────────────────────────────────────
async function callClaude(prompt, maxTokens) {
  if (!state.apiKey) throw new Error('NO_KEY');
  var res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': state.apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: maxTokens || 256,
      messages: [{ role:'user', content:prompt }]
    })
  });
  var data = await res.json();
  if (!res.ok) throw new Error(data.error && data.error.message || 'HTTP '+res.status);
  return data.content[0].text.trim();
}

async function inferCategory(description, type) {
  if (type === 'income') {
    var d = description.toLowerCase();
    if (/nomina|sueldo|salari|trabajo|empresa/.test(d)) return 'salario';
    if (/freelance|proyecto|factura|cliente/.test(d)) return 'freelance';
    if (!state.apiKey) return 'salario';
    try {
      var r = await callClaude(
        'Classify this income into exactly one of: salario, freelance, otros.\n' +
        'Transaction: "' + description + '"\nReply with ONLY the id.', 16);
      return INC_CATS.indexOf(r) !== -1 ? r : 'salario';
    } catch(e) { return 'salario'; }
  }

  // 1. Try local merchant map (instant, no API needed)
  var local = localCatLookup(description);
  if (local) return local;

  // 2. Fall back to Claude for unknowns
  if (!state.apiKey) return 'otros';
  try {
    var r2 = await callClaude(
      'You are categorizing a teen expense in Spain. Classify into exactly one of:\n' +
      EXP_CATS.join(', ') + '\n' +
      'comida_snacks=food/cafes/snacks, transporte=transport, ocio=entertainment/games, ' +
      'ropa=clothing/fashion, tecnologia=tech/gadgets, cuidado_personal=beauty/haircut, ' +
      'material_escolar=school supplies, suscripciones=subscriptions, ' +
      'deporte_hobbies=gym/sports/hobbies, otros=unknown\n' +
      'Transaction: "' + description + '"\nReply with ONLY the category id.', 20);
    return EXP_CATS.indexOf(r2) !== -1 ? r2 : 'otros';
  } catch(e) { return 'otros'; }
}

// ── Tab Navigation ─────────────────────────────────────────────────────────
function setTab(i) {
  state.activeTab = i;
  ['ti0','ti1','ti2','ti3'].forEach(function(id,idx){
    document.getElementById(id).className='tab-icon'+(idx===i?' active':'');
  });
  ['tl0','tl1','tl2','tl3'].forEach(function(id,idx){
    document.getElementById(id).className='tab-label'+(idx===i?' active':'');
  });
  render();
}

// ── Modal ──────────────────────────────────────────────────────────────────
var modalSaving = false;

function openAddModal(initial) {
  initial = initial || {};
  state.entryType = initial.type || 'expense';
  var amtEl = document.getElementById('modal-amount');
  var descEl = document.getElementById('modal-desc');
  amtEl.value  = initial.amount || '';
  descEl.value = initial.description || '';
  setEntryType(state.entryType);
  validateModal();
  document.getElementById('overlay').classList.add('show');
  setTimeout(function(){ (!initial.amount ? amtEl : descEl).focus(); }, 320);
}
function closeModal() {
  if (modalSaving) return;
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('modal-status').textContent = '';
}
function handleOverlayClick(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}
function setEntryType(t) {
  state.entryType = t;
  document.getElementById('toggle-expense').className='toggle-btn '+(t==='expense'?'active':'inactive');
  document.getElementById('toggle-income').className ='toggle-btn '+(t==='income' ?'active':'inactive');
}
function validateModal() {
  var amt  = parseFloat(sanitizeAmt(document.getElementById('modal-amount').value));
  var desc = document.getElementById('modal-desc').value.trim();
  var btn  = document.getElementById('modal-save');
  var ok   = amt > 0 && desc.length > 0;
  btn.style.background = ok ? '#fff' : '#141414';
  btn.style.color      = ok ? '#000' : '#2a2a2a';
  btn.style.cursor     = ok ? 'pointer' : 'default';
  return ok;
}
async function submitEntry() {
  if (!validateModal() || modalSaving) return;
  var amt  = parseFloat(sanitizeAmt(document.getElementById('modal-amount').value));
  var desc = document.getElementById('modal-desc').value.trim();
  var btn  = document.getElementById('modal-save');
  var sts  = document.getElementById('modal-status');
  modalSaving = true;
  btn.textContent = 'Guardando…'; btn.style.opacity = '0.7';
  sts.textContent = 'Asignando categoría…';
  var cat = await inferCategory(desc, state.entryType);
  state.entries.unshift({id:uid(),type:state.entryType,amount:amt,description:desc,category:cat,date:todayStr()});
  save();
  modalSaving = false;
  btn.textContent = 'Guardar'; btn.style.opacity = '1';
  sts.textContent = '';
  closeModal(); render();
}

// ── Visual helpers ─────────────────────────────────────────────────────────
function buildDonut(segments, size) {
  if (!segments || !segments.length) return '';
  size = size || 140;
  var cx = size/2, cy = size/2;
  var outerR = size/2 - 6, innerR = Math.round(outerR * 0.58);
  var total = segments.reduce(function(s,d){ return s+d.v; }, 0);
  if (!total) return '';
  if (segments.length === 1) {
    var g = segments[0].g;
    return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">'+
      '<circle cx="'+cx+'" cy="'+cy+'" r="'+outerR+'" fill="rgb('+g+','+g+','+g+')"/>'+
      '<circle cx="'+cx+'" cy="'+cy+'" r="'+innerR+'" fill="#000"/></svg>';
  }
  var paths='', angle=-Math.PI/2, gapA=0.03;
  segments.forEach(function(seg){
    var sweep=(seg.v/total)*Math.PI*2;
    var a1=angle+gapA/2, a2=angle+sweep-gapA/2;
    if (a2<=a1){angle+=sweep;return;}
    var lg=(sweep-gapA)>Math.PI?1:0;
    var x1o=(cx+outerR*Math.cos(a1)).toFixed(2),y1o=(cy+outerR*Math.sin(a1)).toFixed(2);
    var x2o=(cx+outerR*Math.cos(a2)).toFixed(2),y2o=(cy+outerR*Math.sin(a2)).toFixed(2);
    var x1i=(cx+innerR*Math.cos(a2)).toFixed(2),y1i=(cy+innerR*Math.sin(a2)).toFixed(2);
    var x2i=(cx+innerR*Math.cos(a1)).toFixed(2),y2i=(cy+innerR*Math.sin(a1)).toFixed(2);
    paths+='<path d="M'+x1o+','+y1o+' A'+outerR+','+outerR+' 0 '+lg+',1 '+x2o+','+y2o+
           ' L'+x1i+','+y1i+' A'+innerR+','+innerR+' 0 '+lg+',0 '+x2i+','+y2i+
           ' Z" fill="rgb('+seg.g+','+seg.g+','+seg.g+')"/>';
    angle+=sweep;
  });
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">'+paths+'</svg>';
}

function buildTrendChart() {
  var months=[], now=new Date();
  for (var i=5;i>=0;i--) {
    var d=new Date(now.getFullYear(),now.getMonth()-i,1);
    var key=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    var lbl=d.toLocaleDateString('es-ES',{month:'short'}).replace('.','');
    var inc=0,exp=0;
    state.entries.forEach(function(e){
      if(monthOf(e.date)===key){ if(e.type==='income')inc+=e.amount; else exp+=e.amount; }
    });
    months.push({label:lbl,inc:inc,exp:exp});
  }
  if (!months.some(function(m){return m.inc>0||m.exp>0;})) return '';
  var W=353,H=72,bW=13,gap=3,colW=W/6;
  var maxVal=months.reduce(function(mx,m){return Math.max(mx,m.inc,m.exp);},1);
  var items='';
  months.forEach(function(m,i){
    var cx=i*colW+colW/2,incH=(m.inc/maxVal)*H,expH=(m.exp/maxVal)*H;
    if(m.inc>0) items+='<rect x="'+(cx-bW-gap/2).toFixed(1)+'" y="'+(H-incH).toFixed(1)+'" width="'+bW+'" height="'+incH.toFixed(1)+'" rx="3" fill="#3a3a3a"/>';
    if(m.exp>0) items+='<rect x="'+(cx+gap/2).toFixed(1)+'" y="'+(H-expH).toFixed(1)+'" width="'+bW+'" height="'+expH.toFixed(1)+'" rx="3" fill="#888"/>';
    items+='<text x="'+cx.toFixed(1)+'" y="'+(H+14)+'" text-anchor="middle" font-size="9" fill="#3a3a3a" font-family="-apple-system,Helvetica Neue,sans-serif">'+m.label+'</text>';
  });
  return '<svg width="100%" height="'+(H+18)+'" viewBox="0 0 '+W+' '+(H+18)+'" preserveAspectRatio="xMidYMid meet">'+items+'</svg>';
}

// ── Swipe-to-delete ────────────────────────────────────────────────────────
var _swipeOpen = null;

function closeSwipeRow(id) {
  var row = document.querySelector('.swipe-row[data-id="'+id+'"]');
  if (row) { row.style.transition='transform .25s ease'; row.style.transform='translateX(0)'; }
  if (_swipeOpen===id) _swipeOpen=null;
}

function attachSwipeListeners() {
  var REVEAL = 88;
  document.querySelectorAll('.swipe-row').forEach(function(row) {
    var id = row.dataset.id;
    var sx=0, sy=0, isHoriz=false, decided=false, wasOpen=false;

    row.addEventListener('touchstart', function(e) {
      // Close other rows
      if (_swipeOpen && _swipeOpen!==id) closeSwipeRow(_swipeOpen);
      sx=e.touches[0].clientX; sy=e.touches[0].clientY;
      isHoriz=false; decided=false;
      wasOpen=(_swipeOpen===id);
      row.style.transition='none';
    }, {passive:true});

    row.addEventListener('touchmove', function(e) {
      var dx=e.touches[0].clientX-sx, dy=e.touches[0].clientY-sy;
      if (!decided) {
        if (Math.abs(dx)<5 && Math.abs(dy)<5) return;
        isHoriz=Math.abs(dx)>Math.abs(dy);
        decided=true;
      }
      if (!isHoriz) return;
      e.preventDefault();
      var base=wasOpen?-REVEAL:0;
      var trans=Math.min(0, Math.max(base+dx, -REVEAL));
      row.style.transform='translateX('+trans+'px)';
    }, {passive:false});

    row.addEventListener('touchend', function() {
      if (!decided||!isHoriz) return;
      var mat=getComputedStyle(row).transform;
      var cur=mat==='none'?0:new DOMMatrix(mat).m41;
      row.style.transition='transform .25s ease';
      if (cur < -REVEAL*0.4) {
        row.style.transform='translateX(-'+REVEAL+'px)';
        _swipeOpen=id;
      } else {
        row.style.transform='translateX(0)';
        if (_swipeOpen===id) _swipeOpen=null;
      }
    }, {passive:true});
  });

  // Tap anywhere outside to close open row
  document.addEventListener('touchstart', function(e) {
    if (!_swipeOpen) return;
    var wrap=document.querySelector('[data-wrapid="'+_swipeOpen+'"]');
    if (wrap && !wrap.contains(e.target)) closeSwipeRow(_swipeOpen);
  }, {passive:true});
}

    if(btn){btn.textContent='✦  Analizar con Claude';btn.style.opacity='1';}
    var e2=document.getElementById('analysis-error');
    if(e2) e2.textContent=e.message==='NO_KEY'?'Configura tu API key en la pestaña Exportar.':'Error: '+e.message;
  }
}

// ── Export ─────────────────────────────────────────────────────────────────
function renderExport() {
  var totInc=state.entries.filter(function(e){return e.type==='income';}).reduce(function(s,e){return s+e.amount;},0);
  var totExp=state.entries.filter(function(e){return e.type==='expense';}).reduce(function(s,e){return s+e.amount;},0);
  return '<div style="padding-bottom:24px">'+
    '<div style="padding:60px 20px 16px;border-bottom:1px solid #0f0f0f">'+
      '<div style="font-size:28px;font-weight:800;letter-spacing:-1.5px">Exportar</div>'+
    '</div>'+
    '<div style="padding:20px;display:flex;flex-direction:column;gap:12px">'+
    // API Key
    '<div class="card">'+
      '<div style="font-size:13px;font-weight:700;margin-bottom:4px">API Key — Anthropic</div>'+
      '<div style="font-size:12px;color:#444;line-height:1.5;margin-bottom:10px">Necesaria para categorización IA de merchants desconocidos y análisis</div>'+
      '<input type="password" id="apikey-input" class="input-field" placeholder="sk-ant-api03-…" value="'+esc(state.apiKey)+'" oninput="updateApiKey(this.value)">'+
      (state.apiKey?'<div style="font-size:11px;color:#3a3a3a;margin-top:7px">✓ Configurada · guardada localmente</div>':'')+
    '</div>'+
    // Budget
    '<div class="card">'+
      '<div style="font-size:13px;font-weight:700;margin-bottom:4px">Presupuesto mensual</div>'+
      '<div style="font-size:12px;color:#444;line-height:1.5;margin-bottom:10px">Límite de gasto mensual — muestra barra de progreso en el inicio</div>'+
      '<div style="position:relative">'+
        '<span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px;color:#444;pointer-events:none">€</span>'+
        '<input type="text" inputmode="decimal" id="budget-input" class="input-field" placeholder="0,00" style="padding-left:30px" value="'+(state.budget>0?String(state.budget).replace('.',','):'')+'" oninput="updateBudget(this.value)">'+
      '</div>'+
      (state.budget>0?'<div style="font-size:11px;color:#3a3a3a;margin-top:7px">✓ Presupuesto: '+fmtEur(state.budget)+' / mes</div>':'')+
    '</div>'+
    // Import
    '<div class="card">'+
      '<div style="font-size:13px;font-weight:700;margin-bottom:4px">Importar desde texto</div>'+
      '<div style="font-size:12px;color:#444;line-height:1.5;margin-bottom:10px">Pega una notificación de Apple Pay, SMS bancario o recibo</div>'+
      '<textarea id="import-text" class="input-field" style="min-height:78px" placeholder="«Apple Pay — Mercadona — 24,50 €»\n«Has pagado 9,99 € a Netflix»"></textarea>'+
      '<button id="import-btn" onclick="doImport()" style="width:100%;margin-top:8px;padding:12px;background:#0d0d0d;color:#2a2a2a;border:1px solid #1c1c1c;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;min-height:44px">Analizar texto</button>'+
      '<div id="import-error" style="margin-top:8px;font-size:12px;color:#555"></div>'+
      '<div id="import-confirm" class="'+(state.importParsed?'show':'')+'">'+
        (state.importParsed?renderImportConfirm(state.importParsed):'')+
      '</div>'+
    '</div>'+
    // Stats
    '<div style="background:#090909;border:1px solid #0f0f0f;border-radius:12px;padding:16px 20px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">'+
      statCell('Entradas',state.entries.length)+statCell('Ingresos',fmtEur(totInc))+statCell('Gastos',fmtEur(totExp))+
    '</div>'+
    '<button class="btn-primary" onclick="window.print()">Exportar PDF · Compartir</button>'+
    // Danger
    '<div class="card" style="margin-top:8px">'+
      '<div style="font-size:13px;font-weight:700;color:#444;margin-bottom:4px">Zona peligrosa</div>'+
      '<div style="font-size:12px;color:#333;line-height:1.5;margin-bottom:10px">Escribe DELETE para borrar todos los datos</div>'+
      '<input id="clear-input" class="input-field" placeholder="DELETE" style="margin-bottom:8px;letter-spacing:2px" autocapitalize="characters" oninput="updateClearBtn(this.value)">'+
      '<button id="clear-btn" onclick="doClear()" style="width:100%;padding:12px;background:#0d0d0d;color:#2a2a2a;border:1px solid #1c1c1c;border-radius:8px;font-size:14px;font-weight:600;cursor:default;min-height:44px">Borrar todo</button>'+
    '</div>'+
    '</div></div>';
}

function statCell(label,val) {
  return '<div style="text-align:center"><div style="font-size:18px;font-weight:700;font-variant-numeric:tabular-nums">'+esc(String(val))+'</div><div class="section-label" style="margin-top:4px">'+esc(label)+'</div></div>';
}
function renderImportConfirm(p) {
  return '<div style="font-size:11px;color:#444;margin-bottom:8px">Confirmar entrada:</div>'+
    '<div style="font-size:17px;font-weight:700">'+esc(p.description)+'</div>'+
    '<div style="font-size:13px;color:#555;margin-top:4px;font-variant-numeric:tabular-nums">'+fmtEur(p.amount)+' · '+esc(catLabel(p.category))+' · '+(p.type==='expense'?'Gasto':'Ingreso')+'</div>'+
    '<div style="display:flex;gap:8px;margin-top:12px">'+
      '<button onclick="confirmImport()" style="flex:1;padding:12px;background:#fff;color:#000;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;min-height:44px">Guardar</button>'+
      '<button onclick="cancelImport()" class="btn-secondary" style="flex:1;padding:12px">Cancelar</button>'+
    '</div>';
}

function updateApiKey(v) { state.apiKey=v; lsSet('ft_apikey',v); }
function updateBudget(v) {
  var n=parseFloat(sanitizeAmt(v));
  state.budget=(isNaN(n)||n<=0)?0:n; lsSet('ft_budget',state.budget);
}
function updateClearBtn(v) {
  var btn=document.getElementById('clear-btn'); if(!btn)return;
  if(v==='DELETE'){btn.style.background='#1e1e1e';btn.style.color='#777';btn.style.cursor='pointer';}
  else{btn.style.background='#0d0d0d';btn.style.color='#2a2a2a';btn.style.cursor='default';}
}
function doClear() {
  var v=document.getElementById('clear-input');
  if(!v||v.value!=='DELETE')return;
  state.entries=[];state.analysisResult='';save();render();
}

async function doImport() {
  var textEl=document.getElementById('import-text'), errEl=document.getElementById('import-error');
  var btn=document.getElementById('import-btn'), conf=document.getElementById('import-confirm');
  if(!textEl||!textEl.value.trim())return;
  var txt=textEl.value.trim();
  if(errEl)errEl.textContent=''; if(conf)conf.className='';
  if(btn){btn.textContent='Procesando…';btn.style.opacity='0.6';}
  var parsed=null;
  if(state.apiKey){
    try{
      var r=await callClaude(
        'Extract a financial transaction from the text below.\nReturn ONLY a valid JSON object:\n'+
        '{"type":"expense","amount":24.50,"description":"Mercadona","category":"comida_snacks"}\n'+
        'Rules: type is "expense" or "income". amount is a number. description max 30 chars. '+
        'category is one of: comida_snacks, transporte, ocio, ropa, tecnologia, cuidado_personal, material_escolar, suscripciones, deporte_hobbies, otros, salario, freelance.\n\n'+
        'Text: "'+txt.substring(0,400)+'"\n\nReturn ONLY the JSON.',128);
      var clean=r.replace(/```(?:json)?\n?|```\n?/g,'').trim();
      var p=JSON.parse(clean);
      if(p.amount>0&&p.description)parsed=p;
    }catch(e){}
  }
  if(!parsed){
    var m=txt.match(/(\d+)[,.](\d{1,2})/);
    if(m){
      var amt=parseFloat(m[1]+'.'+m[2]);
      var words=txt.replace(/[€$£\d.,\-+:]/g,' ').replace(/\s+/g,' ').trim().split(' ').filter(Boolean);
      var desc=words.slice(0,4).join(' ').substring(0,30)||'Importado';
      var cat=localCatLookup(desc)||'otros';
      parsed={type:'expense',amount:amt,description:desc,category:cat};
    }
  }
  if(btn){btn.textContent='Analizar texto';btn.style.opacity='1';}
  if(parsed){
    state.importParsed=parsed;
    if(conf){conf.innerHTML=renderImportConfirm(parsed);conf.className='show';}
  } else {
    if(errEl)errEl.textContent='No se pudo detectar ningún importe. Añade manualmente con el botón +.';
  }
}
function confirmImport() {
  if(!state.importParsed)return;
  var p=state.importParsed;
  state.entries.unshift({id:uid(),type:p.type,amount:Number(p.amount),description:p.description,category:p.category,date:todayStr()});
  save(); state.importParsed=null;
  var t=document.getElementById('import-text'); if(t)t.value='';
  var c=document.getElementById('import-confirm'); if(c)c.className='';
  render();
}
function cancelImport() {
  state.importParsed=null;
  var c=document.getElementById('import-confirm'); if(c)c.className='';
}

// ── Print ──────────────────────────────────────────────────────────────────
function renderPrint() {
  var el=document.getElementById('print-view'); if(!el)return;
  var inc=state.entries.filter(function(e){return e.type==='income';}).reduce(function(s,e){return s+e.amount;},0);
  var exp=state.entries.filter(function(e){return e.type==='expense';}).reduce(function(s,e){return s+e.amount;},0);
  var bal=inc-exp, byCat={};
  state.entries.filter(function(e){return e.type==='expense';}).forEach(function(e){byCat[e.category]=(byCat[e.category]||0)+e.amount;});
  var catRows=Object.keys(byCat).length===0?'':
    Object.keys(byCat).sort(function(a,b){return byCat[b]-byCat[a];}).map(function(c){
      return '<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #eee;font-size:13px"><span>'+esc(catLabel(c))+'</span><span style="font-weight:700">'+fmtEur(byCat[c])+'</span></div>';
    }).join('');
  el.innerHTML='<div style="padding:40px 48px;color:#000;font-family:-apple-system,Helvetica Neue,sans-serif;max-width:640px">'+
    '<div style="border-bottom:2px solid #000;padding-bottom:20px;margin-bottom:24px">'+
      '<div style="font-size:30px;font-weight:800;letter-spacing:-1px">Resumen Financiero</div>'+
      '<div style="font-size:13px;color:#888;margin-top:6px">'+new Date().toLocaleDateString('es-ES',{year:'numeric',month:'long',day:'numeric'})+'</div>'+
    '</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-bottom:32px">'+
      printStat('Balance',(bal<0?'−':'+')+fmtEur(bal))+printStat('Ingresos totales',fmtEur(inc))+printStat('Gastos totales',fmtEur(exp))+
    '</div>'+
    '<div style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#aaa;margin-bottom:10px">Por categoría</div>'+catRows+
    '<div style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#aaa;margin-top:28px;margin-bottom:10px">Transacciones ('+state.entries.length+')</div>'+
    state.entries.map(function(e){
      return '<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f2f2f2;font-size:12px;gap:12px">'+
        '<div style="flex:1"><span style="font-weight:600">'+esc(e.description)+'</span><span style="color:#aaa;margin-left:6px">('+esc(catLabel(e.category))+')</span></div>'+
        '<div style="text-align:right;white-space:nowrap"><span style="font-weight:700">'+(e.type==='income'?'+':'−')+fmtEur(e.amount)+'</span><span style="color:#bbb;margin-left:8px">'+esc(fmtDate(e.date))+'</span></div>'+
        '</div>';
    }).join('')+
    '</div>';
}
function printStat(l,v){return '<div><div style="font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px">'+esc(l)+'</div><div style="font-size:22px;font-weight:800">'+esc(v)+'</div></div>';}

// ── Attach listeners ───────────────────────────────────────────────────────
function attachListeners(tab) {
  if (tab===1) attachSwipeListeners();
  if (tab===3) {
    var ta=document.getElementById('import-text'), btn=document.getElementById('import-btn');
    if(ta&&btn){
      ta.addEventListener('input',function(){
        var has=ta.value.trim().length>0;
        btn.style.background=has?'#1a1a1a':'#0d0d0d';
        btn.style.color=has?'#888':'#2a2a2a';
      });
    }
  }
}

// ── URL params (Apple Pay Shortcut) ────────────────────────────────────────
function parseUrlParams() {
  var p=new URLSearchParams(window.location.search);
  if(p.get('action')==='add'){
    var init={type:p.get('type')||'expense',amount:p.get('amount')||'',description:p.get('description')||''};
    window.history.replaceState({},'',window.location.pathname);
    openAddModal(init);
  }
}

// ── Boot ───────────────────────────────────────────────────────────────────
load(); render(); parseUrlParams();
</script>
